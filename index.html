<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>奶龙的个人博客</title>
    <style>
        :root {
            --bg: #F2F2F7;
            --card: rgba(255, 255, 255, 0.85);
            --text: #000000;
            --sub: #8E8E93;
            --accent: #0A84FF;
            --border: rgba(0, 0, 0, 0.08);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; }
        
        .container { padding: 20px 20px 100px; max-width: 600px; margin: 0 auto; }
        .header { margin-bottom: 30px; }
        .site-title { font-size: 26px; font-weight: 800; letter-spacing: -1px; }

        /* 卡片 */
        .glass-card { 
            background: var(--card); border: 1px solid var(--border); border-radius: 24px; 
            padding: 22px; margin-bottom: 15px; backdrop-filter: blur(15px);
            transition: transform 0.2s;
        }
        .glass-card:active { transform: scale(0.97); }

        /* 1. 公告弹窗 (居中模板) */
        .notice-mask { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); 
            display: none; z-index: 9000; opacity: 0; transition: 0.3s; align-items: center; justify-content: center; 
        }
        .notice-box { width: 80%; max-width: 300px; background: #fff; border-radius: 30px; padding: 25px; text-align: center; transform: scale(0.9); transition: 0.3s; }
        .notice-mask.show { display: flex; opacity: 1; }
        .notice-mask.show .notice-box { transform: scale(1); }

        /* 2. 文章阅读器 (底部抽屉模板 - iOS 26 规范) */
        .article-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.2); display: none; z-index: 9500; opacity: 0; transition: 0.4s; }
        .article-view { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 85vh; 
            background: #fff; border-radius: 35px 35px 0 0; z-index: 9600;
            transform: translateY(100%); transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; padding: 30px 25px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        .article-mask.show { display: block; opacity: 1; }
        .article-view.show { transform: translateY(0); }
        .article-handle { width: 40px; height: 5px; background: #DDD; border-radius: 10px; align-self: center; margin-bottom: 20px; }
        .article-content { overflow-y: auto; flex: 1; line-height: 1.8; font-size: 17px; text-align: left; color: #333; }

        /* Dock */
        .dock { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); 
            border: 1px solid var(--border); border-radius: 32px; display: flex; 
            padding: 8px 15px; z-index: 1000; box-shadow: 0 8px 30px rgba(0,0,0,0.06);
        }
        .dock-item { display: flex; flex-direction: column; align-items: center; width: 80px; opacity: 0.4; cursor: pointer; }
        .dock-item.active { opacity: 1; }
        .dock-text { font-size: 11px; font-weight: 700; margin-top: 2px; }

        .btn-close { background: var(--accent); color: #fff; border: none; padding: 12px 30px; border-radius: 16px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="site-title">奶龙的个人博客</h1>
        <p id="hitokoto" style="font-size:11px; opacity:0.5; margin-top:4px;">...</p>
    </div>

    <div id="p-home" class="page">
        <div style="text-align:center; margin-bottom:30px;">
            <img src="https://github.com/nailong78.png" style="width:80px; height:80px; border-radius:50%; border:1px solid var(--border);" onclick="this.style.transform='scale(1.1)';setTimeout(()=>this.style.transform='scale(1)',200)">
        </div>
        <div id="post-list"></div>
    </div>

    <div id="p-about" class="page" style="display:none;">
        <div class="glass-card">
            <h2 style="margin-bottom:12px;">关于本站</h2>
            <p style="font-size:15px; line-height:1.7; opacity:0.7;">这里是奶龙的个人实验室。我们精简了所有不必要的功能，只为提供最极致的亮色模式阅读体验。</p>
        </div>
    </div>
</div>

<div class="notice-mask" id="not-mask">
    <div class="notice-box">
        <div style="font-size:24px; margin-bottom:10px;">🔔</div>
        <h3 style="margin-bottom:10px;">系统公告</h3>
        <p id="not-text" style="font-size:14px; opacity:0.7; line-height:1.6;"></p>
        <button class="btn-close" onclick="closeNotice()">知道了</button>
    </div>
</div>

<div class="article-mask" id="art-mask" onclick="closeArticle()"></div>
<div class="article-view" id="art-view">
    <div class="article-handle"></div>
    <h2 id="art-title" style="margin-bottom:20px; font-size:24px;"></h2>
    <div id="art-body" class="article-content"></div>
</div>

<div class="dock">
    <div class="dock-item active" onclick="nav('home', this)"><span>🏠</span><span class="dock-text">首页</span></div>
    <div class="dock-item" onclick="nav('about', this)"><span>ℹ️</span><span class="dock-text">关于</span></div>
</div>

<script>
    const user = "nailong78", repo = "nailong78.github.io";

    const nav = (p, el) => {
        document.querySelectorAll('.page').forEach(s => s.style.display = 'none');
        document.getElementById('p-'+p).style.display = 'block';
        document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    };

    // 公告逻辑
    const closeNotice = () => {
        const m = document.getElementById('not-mask');
        m.classList.remove('show');
        setTimeout(() => m.style.display = 'none', 300);
    };

    // 文章逻辑
    const openArticle = async (name) => {
        const m = document.getElementById('art-mask'), v = document.getElementById('art-view');
        document.getElementById('art-title').innerText = name.replace('.txt','');
        document.getElementById('art-body').innerText = "读取中...";
        m.style.display = 'block';
        setTimeout(() => { m.classList.add('show'); v.classList.add('show'); }, 50);
        const r = await fetch(`posts/${name}`);
        document.getElementById('art-body').innerText = await r.text();
    };
    const closeArticle = () => {
        const m = document.getElementById('art-mask'), v = document.getElementById('art-view');
        m.classList.remove('show'); v.classList.remove('show');
        setTimeout(() => m.style.display = 'none', 400);
    };

    const init = async () => {
        // 加载公告
        fetch('announcement/notice.txt').then(r => r.text()).then(t => {
            if(t.length > 2) {
                document.getElementById('not-text').innerText = t;
                const m = document.getElementById('not-mask');
                m.style.display = 'flex';
                setTimeout(() => m.classList.add('show'), 100);
            }
        }).catch(() => {});

        // 加载文章列表
        const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts`);
        if(res.ok) {
            const data = await res.json();
            const list = document.getElementById('post-list');
            data.filter(f => f.name.endsWith('.txt')).forEach(f => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.innerHTML = `<h3>${f.name.replace('.txt','')}</h3><p style="font-size:12px; opacity:0.4; margin-top:8px;">阅读全文</p>`;
                card.onclick = () => openArticle(f.name);
                list.appendChild(card);
            });
        }
        
        fetch('https://v1.hitokoto.cn?c=e').then(r=>r.json()).then(d=>document.getElementById('hitokoto').innerText=d.hitokoto);
    };

    window.onload = init;
</script>
</body>
</html>
