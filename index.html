<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nailong78 的博客</title>
    <style>
        /* 基础设置 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            padding-bottom: 80px; /* 给底部导航留空间 */
        }

        /* 动态背景 */
        .background-blob {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 10% 20%, rgba(60, 20, 100, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(20, 80, 100, 0.4) 0%, transparent 40%);
            filter: blur(40px);
        }
        .orb {
            position: absolute; width: 200px; height: 200px;
            background: linear-gradient(135deg, #7F00FF 0%, #E100FF 100%);
            border-radius: 50%; filter: blur(70px); opacity: 0.5;
            top: 5%; right: -50px; z-index: -1;
            animation: float 10s ease-in-out infinite;
        }

        /* 容器 */
        .container { width: 100%; max-width: 450px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }

        /* iOS 液态玻璃组件 */
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .glass-card:active { transform: scale(0.98); }

        /* 头像与个人信息 */
        .profile-section { text-align: center; padding-top: 40px; padding-bottom: 40px; }
        .avatar {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            margin-bottom: 16px;
            object-fit: cover;
        }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
        .bio { color: rgba(255,255,255,0.7); font-size: 15px; line-height: 1.4; }

        /* 文章列表项 */
        .post-item { display: block; text-decoration: none; color: inherit; position: relative; overflow: hidden; }
        .post-date { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .post-title { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .post-preview { font-size: 14px; color: rgba(255,255,255,0.6); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* 底部导航栏 (Dock栏风格) */
        .dock {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(40, 40, 40, 0.6);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 24px; border-radius: 100px;
            display: flex; gap: 24px; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .dock-icon { color: #fff; text-decoration: none; font-size: 14px; font-weight: 600; opacity: 0.7; transition: 0.2s; }
        .dock-icon.active { opacity: 1; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(20px); } }
    </style>
</head>
<body>

    <div class="background-blob"></div>
    <div class="orb"></div>

    <div class="container">
        <div class="glass-card profile-section">
            <img src="https://github.com/nailong78.png" alt="Avatar" class="avatar">
            <h1>Nailong78</h1>
            <p class="bio">极简主义 / 科技爱好者 / 博客主理人<br>记录思维的流动</p>
        </div>

        <a href="#" class="glass-card post-item">
            <div class="post-date">2026.01.09</div>
            <div class="post-title">Hello World: 博客起航</div>
            <div class="post-preview">这是我的第一篇 GitHub 博客，完全在云端构建，没有任何本地文件。点击阅读全文...</div>
        </a>

        <a href="#" class="glass-card post-item">
            <div class="post-date">置顶</div>
            <div class="post-title">关于 iOS 液态风格的设计理念</div>
            <div class="post-preview">探索透明度、模糊与光影在移动端网页设计中的极限运用。</div>
        </a>
    </div>

    <div class="dock">
        <a href="#" class="dock-icon active">首页</a>
        <a href="https://github.com/nailong78" class="dock-icon">GitHub</a>
        <a href="#" class="dock-icon">关于</a>
    </div>

</body>
</html>
