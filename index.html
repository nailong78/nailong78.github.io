<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>奶龙的数字花园</title>
    <style>
        :root {
            --bg-color: #050505; --text-main: #ffffff; --text-sub: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #0A84FF;
        }
        body.light-mode {
            --bg-color: #f2f4f6; --text-main: #1a1a1a; --text-sub: rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; padding-bottom: 120px; transition: 0.6s ease; }
        
        /* 玻璃弹窗系统 */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); display:none; z-index: 2000; align-items: center; justify-content: center; opacity: 0; transition: 0.4s; }
        .modal-content { width: 85%; max-width: 320px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; padding: 25px; backdrop-filter: blur(40px); transform: scale(0.9); transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1); }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-overlay.show .modal-content { transform: scale(1); }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: var(--text-main); font-size: 14px; outline: none; }
        .btn-primary { width: 100%; padding: 12px; border-radius: 12px; background: var(--accent); border: none; color: #fff; font-weight: 600; margin-top: 10px; cursor: pointer; }
        .btn-link { font-size: 12px; color: var(--text-sub); text-align: center; margin-top: 15px; cursor: pointer; display: block; }

        /* 顶部与导航 */
        .top-bar { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        .right-controls { display: flex; gap: 10px; }
        .glass-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* 底部 Dock */
        .dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); padding: 6px; border-radius: 100px; display: flex; gap: 5px; z-index: 1000; }
        .dock-item { padding: 10px 18px; border-radius: 100px; font-size: 13px; font-weight: 600; opacity: 0.5; transition: 0.3s; cursor: pointer; }
        .dock-item.active { opacity: 1; background: rgba(255,255,255,0.1); }
        .dock-sep { width: 1px; background: var(--glass-border); margin: 8px 5px; }

        /* 其它样式参考之前 */
        .container { padding: 0 20px; }
        .page { transition: 0.4s; }
        .hidden { display: none; }
        .glass-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 25px; padding: 20px; margin-bottom: 15px; }
    </style>
</head>
<body class="dark-mode">

    <div class="modal-overlay" id="loginModal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom:15px; text-align:center;">登录</h2>
            <div id="loginFields">
                <input type="text" id="username" placeholder="用户名">
                <input type="password" id="password" placeholder="密码">
                <button class="btn-primary" onclick="handleLogin()">确认登录</button>
            </div>
            <div id="adminFields" style="display:none;">
                <input type="password" id="adminKey" placeholder="管理员密钥 (admin)">
                <button class="btn-primary" onclick="handleAdminLogin()">验证进入</button>
            </div>
            <span class="btn-link" onclick="toggleAdminMode()" id="toggleText">管理员登录选项</span>
            <span class="btn-link" onclick="closeLogin()">取消</span>
        </div>
    </div>

    <div class="top-bar">
        <div class="site-info">
            <h1 style="font-size:18px;">Garden 26</h1>
        </div>
        <div class="right-controls">
            <div class="glass-btn" onclick="openLogin()">👤</div>
            <div class="glass-btn" onclick="toggleThemeMenu()">🌓</div>
        </div>
    </div>

    <div class="container">
        <div id="page-home" class="page">
            <div style="text-align: center; margin: 20px 0;">
                <img src="https://github.com/nailong78.png" style="width:80px; border-radius:50%; border:3px solid var(--glass-border);" id="avatar">
                <h2 style="margin-top:10px;">奶龙</h2>
            </div>
            <div id="post-list"></div>
        </div>

        <div id="page-app" class="page hidden">
            <div class="glass-card"><h3>我的应用</h3><div id="app-list" style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px; margin-top:15px;"></div></div>
        </div>

        <div id="page-about" class="page hidden">
            <div class="glass-card"><h3>关于</h3><p>iOS 26 风格试验场</p></div>
        </div>

        <div id="page-me" class="page hidden">
            <div class="glass-card">
                <h2 id="meTitle">未登录</h2>
                <div id="adminTools" style="display:none; margin-top:20px; border-top:1px solid var(--glass-border); padding-top:15px;">
                    <p style="color:var(--accent); font-weight:bold;">管理员控制台</p>
                    <button class="btn-primary" style="background:rgba(255,255,255,0.1)" onclick="alert('进入编辑模式...')">📝 新增文章</button>
                    <button class="btn-primary" style="background:rgba(255,255,255,0.1)" onclick="alert('用户管理...')">👥 管理用户</button>
                </div>
                <button class="btn-primary" style="background:#ff3b30; margin-top:20px;" onclick="logout()">退出登录</button>
            </div>
        </div>
    </div>

    <div class="dock">
        <div class="dock-item active" onclick="showPage('home', this)">首页</div>
        <div class="dock-item" onclick="showPage('app', this)">应用</div>
        <div class="dock-item" onclick="showPage('about', this)">关于</div>
        <div class="dock-sep"></div>
        <div class="dock-item" id="dock-me" onclick="handleMeClick(this)">登录</div>
    </div>

    <script>
        // --- 核心逻辑 ---
        let isAdmin = false;
        let currentUser = null;

        function openLogin() { 
            document.getElementById('loginModal').style.display = 'flex';
            setTimeout(() => document.getElementById('loginModal').classList.add('show'), 10);
        }
        function closeLogin() { 
            document.getElementById('loginModal').classList.remove('show');
            setTimeout(() => document.getElementById('loginModal').style.display = 'none', 400);
        }

        function toggleAdminMode() {
            const isAdm = document.getElementById('loginFields').style.display === 'none';
            document.getElementById('loginFields').style.display = isAdm ? 'block' : 'none';
            document.getElementById('adminFields').style.display = isAdm ? 'none' : 'block';
            document.getElementById('modalTitle').innerText = isAdm ? '登录' : '管理员验证';
            document.getElementById('toggleText').innerText = isAdm ? '管理员登录选项' : '切换普通登录';
        }

        function handleAdminLogin() {
            if(document.getElementById('adminKey').value === 'admin') {
                isAdmin = true;
                currentUser = "管理员 (奶龙)";
                loginSuccess();
            } else { alert('密钥错误'); }
        }

        function handleLogin() {
            currentUser = document.getElementById('username').value || "测试用户";
            loginSuccess();
        }

        function loginSuccess() {
            localStorage.setItem('user', currentUser);
            localStorage.setItem('isAdmin', isAdmin);
            closeLogin();
            updateUI();
            showPage('me', document.getElementById('dock-me'));
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function updateUI() {
            const savedUser = localStorage.getItem('user');
            if(savedUser) {
                document.getElementById('dock-me').innerText = "中心";
                document.getElementById('meTitle').innerText = "你好, " + savedUser;
                if(localStorage.getItem('isAdmin') === 'true') {
                    document.getElementById('adminTools').style.display = 'block';
                }
            }
        }

        function handleMeClick(el) {
            if(!localStorage.getItem('user')) openLogin();
            else showPage('me', el);
        }

        function showPage(p, el) {
            document.querySelectorAll('.page').forEach(page => page.classList.add('hidden'));
            document.getElementById('page-'+p).classList.remove('hidden');
            document.querySelectorAll('.dock-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        // 模拟加载数据 (参考之前代码)
        window.onload = () => { updateUI(); /* 加载数据代码... */ };
    </script>
</body>
</html>
