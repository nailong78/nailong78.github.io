<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>奶龙的个人博客</title>
    <style>
        :root {
            --bg: #F2F2F7;
            --glass-light: rgba(255, 255, 255, 0.7);
            --glass-heavy: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.08);
            --accent: #007AFF;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #000; overflow-x: hidden; }
        
        .container { padding: 20px 20px 140px; max-width: 600px; margin: 0 auto; }
        .header { margin-bottom: 35px; }
        .site-title { font-size: 28px; font-weight: 800; letter-spacing: -1.2px; }

        .glass-card { 
            background: var(--glass-light); border: 1px solid var(--border); border-radius: 24px; 
            padding: 22px; margin-bottom: 15px; backdrop-filter: blur(15px);
            transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1);
        }
        .glass-card:active { transform: scale(0.96); }

        /* 通用遮罩 */
        .win-mask { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(20px); 
            display: none; z-index: 9000; opacity: 0; transition: 0.4s; align-items: center; justify-content: center;
        }
        .win-mask.show { display: flex; opacity: 1; }

        /* 弹窗 */
        .win-modal { 
            width: 90%; max-width: 450px; height: 75vh; background: var(--glass-heavy); 
            border: 1px solid rgba(255,255,255,0.5); border-radius: 38px;
            display: flex; flex-direction: column; padding: 25px;
            transform: scale(0.9) translateY(30px); transition: 0.5s cubic-bezier(0.1, 1, 0.2, 1);
        }
        .win-modal.full { width: 100% !important; height: 100% !important; max-width: none !important; border-radius: 0 !important; }
        .win-mask.show .win-modal { transform: scale(1) translateY(0); }

        .win-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .win-btns { display: flex; gap: 8px; }
        .glass-btn { padding: 6px 12px; border-radius: 14px; background: rgba(0,0,0,0.05); font-size: 13px; font-weight: 600; cursor: pointer; }

        .win-body { overflow-y: auto; flex: 1; line-height: 1.8; font-size: 17px; color: #1d1d1f; }
        .win-body img { display: block; width: 100%; height: auto; border-radius: 18px; margin: 15px 0; cursor: zoom-in; }

        /* 强化版图片预览 */
        #img-viewer { z-index: 10000; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); touch-action: none; }
        #img-viewer img { 
            max-width: 100%; max-height: 100%; 
            transition: transform 0.1s ease-out; 
            will-change: transform;
        }

        .dock-wrapper { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 8000; }
        .dock { display: flex; padding: 10px 20px; gap: 12px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(40px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.6); }
        .dock-item { display: flex; flex-direction: column; align-items: center; width: 70px; opacity: 0.4; transition: 0.3s; }
        .dock-item.active { opacity: 1; transform: translateY(-2px); }
        .dock-text { font-size: 10px; font-weight: 700; margin-top: 3px; }

        .confirm-btn { background: var(--accent); color: #fff; border: none; padding: 14px 45px; border-radius: 18px; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="site-title">奶龙的个人博客</h1>
        <p id="hitokoto" style="font-size:11px; opacity:0.6; margin-top:6px; font-weight:500;">载入中...</p>
    </div>
    <div id="p-home" class="page">
        <div style="text-align:center; margin-bottom:40px;">
            <img src="https://github.com/nailong78.png" style="width:85px; height:85px; border-radius:50%; border:3px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.06);" onclick="viewImage(0, [this.src])">
        </div>
        <div id="post-list"></div>
    </div>
    <div id="p-about" class="page" style="display:none;">
        <div class="glass-card"><h2>关于本站</h2><p>支持多图滑动切换、双指缩放及物理返回键监听。</p></div>
    </div>
</div>

<div class="win-mask" id="win-mask">
    <div class="win-modal" id="win-modal">
        <div class="win-header">
            <h3 id="win-title" style="font-size:20px;"></h3>
            <div class="win-btns" id="win-ctrls">
                <div class="glass-btn" onclick="toggleFull()">🔳 全屏</div>
                <div class="glass-btn" onclick="closeWin()" style="color:#FF3B30;">✕ 关闭</div>
            </div>
        </div>
        <div id="win-body" class="win-body"></div>
        <div id="win-footer" style="display:none; text-align:center; padding:20px;"><button class="confirm-btn" onclick="closeWin()">确认</button></div>
    </div>
</div>

<div class="win-mask" id="img-viewer" onclick="closeImageViewer()">
    <img id="full-img" src="" onclick="event.stopPropagation()">
</div>

<div class="dock-wrapper">
    <div class="dock">
        <div class="dock-item active" onclick="nav('home', this)"><span>🏠</span><span class="dock-text">首页</span></div>
        <div class="dock-item" onclick="nav('about', this)"><span>ℹ️</span><span class="dock-text">关于</span></div>
    </div>
</div>

<script>
    const user = "nailong78", repo = "nailong78.github.io";
    let currentImgList = [];
    let currentImgIndex = 0;

    // --- 手势与缩放逻辑 ---
    let scale = 1, startDist = 0, startX = 0;
    const imgEl = document.getElementById('full-img');
    const viewer = document.getElementById('img-viewer');

    viewer.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            startDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
        } else {
            startX = e.touches[0].pageX;
        }
    });

    viewer.addEventListener('touchmove', e => {
        if (e.touches.length === 2 && startDist > 0) {
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            scale = Math.min(Math.max(1, dist / startDist), 4);
            imgEl.style.transform = `scale(${scale})`;
        }
    });

    viewer.addEventListener('touchend', e => {
        if (scale === 1 && e.changedTouches.length === 1) {
            const endX = e.changedTouches[0].pageX;
            if (startX - endX > 50) switchImg(1); // 左滑
            if (endX - startX > 50) switchImg(-1); // 右滑
        }
        startDist = 0;
    });

    const switchImg = (dir) => {
        currentImgIndex = (currentImgIndex + dir + currentImgList.length) % currentImgList.length;
        imgEl.style.opacity = 0;
        setTimeout(() => {
            imgEl.src = currentImgList[currentImgIndex];
            imgEl.style.opacity = 1;
        }, 150);
    };

    const viewImage = (index, list) => {
        currentImgList = list;
        currentImgIndex = index;
        imgEl.src = list[index];
        scale = 1;
        imgEl.style.transform = 'scale(1)';
        viewer.style.display = 'flex';
        setTimeout(() => viewer.classList.add('show'), 50);
        // 插入历史记录，实现返回键关闭大图
        history.pushState({view:'img'}, '');
    };

    const closeImageViewer = () => {
        if(viewer.classList.contains('show')) {
            viewer.classList.remove('show');
            setTimeout(() => viewer.style.display = 'none', 400);
            if(history.state?.view === 'img') history.back();
        }
    };

    window.onpopstate = (e) => {
        if (viewer.style.display === 'flex') {
            viewer.classList.remove('show');
            setTimeout(() => viewer.style.display = 'none', 400);
        }
    };

    // --- 基础逻辑 ---
    const nav = (p, el) => {
        document.querySelectorAll('.page').forEach(s => s.style.display = 'none');
        document.getElementById('p-'+p).style.display = 'block';
        document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    };

    const parseContent = (text) => {
        const urlRegex = /(https?:\/\/[^\s]+|data:image\/[a-zA-Z]+;base64,[^\s]+)/gi;
        const images = [];
        const html = text.replace(urlRegex, (match) => {
            if (match.startsWith('data:image') || /\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(match)) {
                images.push(match);
                const idx = images.length - 1;
                return `##IMG_${idx}##`;
            }
            return `<a href="${match}" target="_blank">查看链接</a>`;
        });
        
        let finalHtml = html.replace(/\n/g, '<br>');
        images.forEach((src, i) => {
            finalHtml = finalHtml.replace(`##IMG_${i}##`, `<img src="${src}" onclick="viewImage(${i}, ${JSON.stringify(images).replace(/"/g, '&quot;')})">`);
        });
        return finalHtml;
    };

    const openWin = (title, content, isNotice = false) => {
        const m = document.getElementById('win-mask'), b = document.getElementById('win-body');
        document.getElementById('win-title').innerText = title;
        b.innerHTML = parseContent(content);
        document.getElementById('win-ctrls').style.display = isNotice ? 'none' : 'flex';
        document.getElementById('win-footer').style.display = isNotice ? 'block' : 'none';
        m.style.display = 'flex';
        setTimeout(() => m.classList.add('show'), 50);
    };

    const closeWin = () => {
        const m = document.getElementById('win-mask');
        m.classList.remove('show');
        setTimeout(() => m.style.display = 'none', 400);
    };

    const toggleFull = () => document.getElementById('win-modal').classList.toggle('full');

    const init = async () => {
        fetch('announcement/notice.txt?v='+Date.now()).then(r => r.text()).then(t => {
            if(t.trim()) openWin('公告', t, true);
        });
        const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts?v=`+Date.now());
        if(res.ok) {
            const data = await res.json();
            data.filter(f => f.name.endsWith('.txt')).forEach(f => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.innerHTML = `<h3>${f.name.replace('.txt','')}</h3>`;
                card.onclick = async () => {
                    const r = await fetch(`posts/${f.name}?v=`+Date.now());
                    openWin(f.name.replace('.txt',''), await r.text());
                };
                document.getElementById('post-list').appendChild(card);
            });
        }
        fetch('https://v1.hitokoto.cn?c=e').then(r=>r.json()).then(d=>document.getElementById('hitokoto').innerText = d.hitokoto);
    };
    window.onload = init;
</script>
</body>
</html>
