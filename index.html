<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>奶龙的个人博客</title>
    <style>
        :root {
            --bg-color: #050505; --text-main: #ffffff; --text-sub: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.12);
            --blob-1: rgba(120, 0, 255, 0.3); --blob-2: rgba(0, 100, 255, 0.3);
            --accent: #0A84FF;
        }

        body.light-mode {
            --bg-color: #f2f4f6; --text-main: #1a1a1a; --text-sub: rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.8);
            --blob-1: rgba(255, 100, 200, 0.2); --blob-2: rgba(0, 200, 255, 0.2);
            --accent: #007AFF;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            min-height: 100vh; transition: background 0.8s cubic-bezier(0.2, 0, 0, 1);
            overflow-x: hidden; padding-bottom: 110px;
        }

        /* 渲染优化背景 */
        .background-blob { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(60px); will-change: transform; }
        .blob { position: absolute; border-radius: 50%; animation: move 20s infinite alternate linear; }
        .blob-1 { top: -5%; left: -5%; width: 250px; height: 250px; background: var(--blob-1); }
        .blob-2 { bottom: 10%; right: -5%; width: 300px; height: 300px; background: var(--blob-2); }
        @keyframes move { from { transform: translate3d(0,0,0); } to { transform: translate3d(30px, 50px, 0); } }

        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 15px 20px; }

        /* 顶部导航 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; height: 48px; margin-bottom: 25px; }
        .header-info { display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .site-title { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
        #hitokoto { font-size: 11px; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; max-width: 240px; }

        .theme-control { position: relative; }
        .theme-btn {
            width: 44px; height: 44px; border-radius: 14px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; z-index: 101;
        }

        .theme-menu {
            position: absolute; top: 55px; right: 0; width: 150px;
            background: var(--glass-bg); backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid var(--glass-border); border-radius: 20px;
            padding: 6px; display: none; flex-direction: column; z-index: 102;
            animation: ios-pop 0.5s cubic-bezier(0.15, 1, 0.3, 1);
        }
        @keyframes ios-pop { from { opacity: 0; transform: scale(0.7) translateY(-20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .menu-item { padding: 12px 14px; border-radius: 14px; font-size: 13px; font-weight: 500; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .menu-item.active .check-mark { color: var(--accent); opacity: 1; }
        .check-mark { opacity: 0; }

        /* 通用卡片样式 */
        .glass-card {
            background: var(--glass-bg); backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid var(--glass-border); border-radius: 28px;
            padding: 22px; margin-bottom: 18px; transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
        }
        .post-link { text-decoration: none; color: inherit; display: block; }
        .post-link:active .glass-card { transform: scale(0.97); }

        /* 页面切换动效 */
        #content-wrapper { position: relative; width: 100%; }
        .page { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; }
        .page.hidden { opacity: 0; transform: translate3d(0, 15px, 0); position: absolute; pointer-events: none; }

        /* 应用网格 */
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 10px; }
        .app-item { display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; color: inherit; }
        .app-icon { width: 60px; height: 60px; background: var(--glass-bg); border-radius: 14px; border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .app-item span { font-size: 12px; font-weight: 500; opacity: 0.8; }

        /* 底部导航栏 */
        .dock-container {
            position: fixed; bottom: 30px; left: 50%; transform: translate3d(-50%, 0, 0);
            background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border); padding: 5px; border-radius: 100px;
            display: flex; gap: 2px; z-index: 99;
        }
        .dock-item {
            position: relative; font-size: 13px; font-weight: 600; padding: 10px 22px;
            cursor: pointer; z-index: 2; transition: color 0.3s; color: var(--text-main); opacity: 0.5;
        }
        .dock-item.active { opacity: 1; }
        .dock-slider {
            position: absolute; top: 5px; left: 5px; height: calc(100% - 10px);
            background: rgba(255,255,255,0.15); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 100px;
            z-index: 1; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }
        body.light-mode .dock-slider { background: rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.08); }
    </style>
</head>
<body>

    <div class="background-blob">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <div class="top-bar">
            <div class="header-info">
                <span class="site-title">奶龙的个人博客</span>
                <div id="hitokoto">载入中...</div>
            </div>
            <div class="theme-control">
                <div class="theme-btn" id="themeBtn">🌓</div>
                <div class="theme-menu" id="themeMenu">
                    <div class="menu-item" data-mode="auto">自动 <span class="check-mark">✓</span></div>
                    <div class="menu-item" data-mode="light">浅色 <span class="check-mark">✓</span></div>
                    <div class="menu-item" data-mode="dark">深色 <span class="check-mark">✓</span></div>
                </div>
            </div>
        </div>

        <div id="content-wrapper">
            <div id="main-content" class="page">
                <div class="glass-card" style="text-align: center;">
                    <img src="https://github.com/nailong78.png" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; border: 2px solid var(--glass-border);">
                    <h2 style="font-size: 20px;">欢迎回来，奶龙</h2>
                </div>

                <a href="post.html?id=first-post" class="post-link">
                    <div class="glass-card">
                        <div style="font-size: 12px; color: var(--accent); margin-bottom: 5px; font-weight: bold;">NEW</div>
                        <h3 style="font-size: 17px; margin-bottom: 8px;">我的第一篇 iOS 26 风格博客</h3>
                        <p style="font-size: 13px; opacity: 0.6; line-height: 1.5;">探索纯 HTML 驱动的液态玻璃美学，开启全云端博客时代。</p>
                    </div>
                </a>

                <a href="post.html?id=tech-future" class="post-link">
                    <div class="glass-card">
                        <h3 style="font-size: 17px; margin-bottom: 8px;">AI 时代的数字极简主义</h3>
                        <p style="font-size: 13px; opacity: 0.6; line-height: 1.5;">为什么在 2026 年，我们需要更通透的交互界面？</p>
                    </div>
                </a>
            </div>

            <div id="app-content" class="page hidden">
                <div class="glass-card">
                    <h3 style="margin-bottom: 15px;">我的应用</h3>
                    <div class="app-grid">
                        <a href="#" class="app-item"><div class="app-icon">🐍</div><span>Python工具</span></a>
                        <a href="#" class="app-item"><div class="app-icon">🌐</div><span>HTML作品</span></a>
                        <a href="#" class="app-item" style="opacity: 0.3;"><div class="app-icon">＋</div><span>待增加</span></a>
                    </div>
                </div>
            </div>

            <div id="about-content" class="page hidden">
                <div class="glass-card">
                    <h3 style="margin-bottom: 10px;">关于 Nailong78</h3>
                    <p style="font-size: 14px; line-height: 1.8;">
                        iOS 26 风格试验场。<br>每一行代码都是对审美的致敬。
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <div class="dock-slider" id="dockSlider"></div>
        <div class="dock-item active" id="nav-home">首页</div>
        <div class="dock-item" id="nav-app">应用</div>
        <div class="dock-item" id="nav-about">关于</div>
    </div>

    <script>
        // 每日一言逻辑
        function getHitokoto() {
            fetch('https://v1.hitokoto.cn?c=e&c=d')
                .then(res => res.json())
                .then(data => {
                    if (data.hitokoto.length <= 15) { document.getElementById('hitokoto').innerText = `“${data.hitokoto}”`; }
                    else { getHitokoto(); }
                });
        }
        getHitokoto();

        // 主题管理
        const themeBtn = document.getElementById('themeBtn'), themeMenu = document.getElementById('themeMenu');
        const menuItems = document.querySelectorAll('.menu-item');
        let mode = localStorage.getItem('blog-mode') || 'auto';

        function applyTheme() {
            const isNight = new Date().getHours() >= 18 || new Date().getHours() < 6;
            if (mode === 'auto') { isNight ? document.body.classList.remove('light-mode') : document.body.classList.add('light-mode'); }
            else { mode === 'light' ? document.body.classList.add('light-mode') : document.body.classList.remove('light-mode'); }
            themeBtn.innerText = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
            menuItems.forEach(i => i.classList.toggle('active', i.dataset.mode === mode));
        }

        themeBtn.onclick = (e) => { e.stopPropagation(); themeMenu.style.display = themeMenu.style.display === 'flex' ? 'none' : 'flex'; };
        menuItems.forEach(item => { item.onclick = function() { mode = this.dataset.mode; localStorage.setItem('blog-mode', mode); applyTheme(); }; });
        document.onclick = () => themeMenu.style.display = 'none';

        // 导航切换
        const slider = document.getElementById('dockSlider');
        const navMap = {
            'home': { nav: document.getElementById('nav-home'), page: document.getElementById('main-content') },
            'app': { nav: document.getElementById('nav-app'), page: document.getElementById('app-content') },
            'about': { nav: document.getElementById('nav-about'), page: document.getElementById('about-content') }
        };

        function switchPage(key) {
            const target = navMap[key];
            slider.style.width = target.nav.offsetWidth + 'px';
            slider.style.transform = `translate3d(${target.nav.offsetLeft - 5}px, 0, 0)`;
            Object.keys(navMap).forEach(k => {
                navMap[k].nav.classList.toggle('active', k === key);
                navMap[k].page.classList.toggle('hidden', k !== key);
            });
        }

        document.getElementById('nav-home').onclick = () => switchPage('home');
        document.getElementById('nav-app').onclick = () => switchPage('app');
        document.getElementById('nav-about').onclick = () => switchPage('about');

        window.onload = () => { switchPage('home'); applyTheme(); };
    </script>
</body>
</html>
