<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>奶龙的个人博客</title>
    <style>
        :root {
            --bg-color: #050505; --text-main: #ffffff; --text-sub: rgba(255, 255, 255, 0.5);
            --glass: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #0A84FF; --drawer-bg: rgba(28, 28, 30, 0.9);
        }
        body.light-mode {
            --bg-color: #F2F2F7; --text-main: #000000; --text-sub: rgba(0, 0, 0, 0.5);
            --glass: rgba(0, 0, 0, 0.04); --glass-border: rgba(0, 0, 0, 0.08);
            --drawer-bg: rgba(255, 255, 255, 0.9);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg-color); color: var(--text-main); height: 100vh; overflow: hidden; transition: 0.5s; }

        /* 背景流体 */
        .bg-blur { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(120,0,255,0.1) 0%, transparent 40%), radial-gradient(circle at 100% 100%, rgba(0,100,255,0.1) 0%, transparent 40%); }

        .container { height: 100vh; overflow-y: auto; padding: 20px 20px 120px 20px; scroll-behavior: smooth; }

        /* 顶部栏 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .site-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .glass-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* 主题选择菜单 */
        .theme-menu { position: absolute; top: 75px; right: 20px; width: 130px; background: var(--glass); backdrop-filter: blur(40px); border-radius: 20px; border: 1px solid var(--glass-border); padding: 6px; display: none; flex-direction: column; z-index: 2000; }
        .menu-item { padding: 12px 14px; border-radius: 14px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .menu-item.active { color: var(--accent); }
        .menu-item.active::after { content: '✓'; font-weight: 800; }

        /* 统一卡片 */
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 28px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(15px); transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1); }
        .glass-card:active { transform: scale(0.97); }

        /* iOS 26 半屏抽屉 */
        .drawer-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); display: none; z-index: 2500; opacity: 0; transition: 0.4s; }
        .drawer { position: fixed; bottom: 0; left: 0; right: 0; height: 70vh; background: var(--drawer-bg); backdrop-filter: blur(50px); border-radius: 35px 35px 0 0; border: 1px solid var(--glass-border); transform: translateY(100%); transition: 0.5s cubic-bezier(0.3, 0.8, 0.3, 1); z-index: 2600; padding: 25px; display: flex; flex-direction: column; }
        .drawer.show { transform: translateY(0); }
        .drawer.full { height: 100vh; border-radius: 0; }
        .drawer-handle { width: 40px; height: 5px; background: var(--text-sub); border-radius: 10px; margin: -10px auto 20px; }
        .drawer-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .drawer-content { overflow-y: auto; flex: 1; font-size: 16px; line-height: 1.7; opacity: 0.9; }

        /* 底部导航 Dock */
        .dock-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--glass); backdrop-filter: blur(35px); border: 1px solid var(--glass-border); border-radius: 35px; display: flex; align-items: center; padding: 6px; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .dock-group { display: flex; position: relative; }
        .dock-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 65px; height: 55px; border-radius: 25px; transition: 0.3s; opacity: 0.5; }
        .dock-item.active { opacity: 1; background: rgba(255,255,255,0.12); }
        body.light-mode .dock-item.active { background: rgba(0,0,0,0.05); }
        .dock-icon { font-size: 20px; margin-bottom: 2px; }
        .dock-text { font-size: 10px; font-weight: 700; }
        .dock-sep { width: 1px; height: 30px; background: var(--glass-border); margin: 0 8px; }

        /* 应用网格 */
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .app-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: inherit; }
        .app-box { width: 68px; height: 68px; background: var(--glass); border-radius: 20px; border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 8px; }

        /* 登录弹窗 */
        .login-modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 4000; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); }
        .login-card { width: 300px; background: var(--drawer-bg); border-radius: 30px; padding: 30px; border: 1px solid var(--glass-border); text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 15px; border: 1px solid var(--glass-border); background: rgba(128,128,128,0.1); color: var(--text-main); outline: none; }
        .btn-main { width: 100%; padding: 14px; border-radius: 15px; border: none; background: var(--accent); color: white; font-weight: 700; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="bg-blur"></div>

    <div class="container">
        <div class="top-bar">
            <div>
                <h1 class="site-title">奶龙的个人博客</h1>
                <p id="hitokoto" style="font-size:11px; opacity:0.5; margin-top:2px;">正在加载...</p>
            </div>
            <div class="glass-btn" onclick="toggleThemeMenu()">🌓</div>
        </div>

        <div id="page-home" class="page">
            <div style="text-align:center; margin-bottom:35px;">
                <img src="https://github.com/nailong78.png" id="avatar" style="width:85px; border-radius:50%; border:3px solid var(--glass-border);" onclick="jello()">
            </div>
            <div id="post-list"></div>
        </div>

        <div id="page-app" class="page" style="display:none;">
            <div class="app-grid" id="app-list"></div>
        </div>

        <div id="page-about" class="page" style="display:none;">
            <div class="glass-card"><h3>关于本站</h3><p style="margin-top:10px; opacity:0.7;">iOS 26 实验室。全自动化文件驱动系统。</p></div>
        </div>

        <div id="page-me" class="page" style="display:none;">
            <div class="glass-card">
                <h2 id="meName">未登录</h2>
                <div id="adminArea" style="display:none; margin-top:20px; border-top:1px solid var(--glass-border); padding-top:20px;">
                    <button class="btn-main" style="background:var(--glass)" onclick="window.open('https://github.com/nailong78/nailong78.github.io/new/main/posts')">📝 发布文章</button>
                </div>
                <button class="btn-main" style="background:#ff3b30; margin-top:15px;" onclick="logout()">安全退出</button>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <div class="dock-group">
            <div class="dock-item active" onclick="navTo('home', this)"><span class="dock-icon">🏠</span><span class="dock-text">首页</span></div>
            <div class="dock-item" onclick="navTo('app', this)"><span class="dock-icon">🚀</span><span class="dock-text">应用</span></div>
            <div class="dock-item" onclick="navTo('about', this)"><span class="dock-icon">ℹ️</span><span class="dock-text">关于</span></div>
        </div>
        <div class="dock-sep"></div>
        <div class="dock-group">
            <div class="dock-item" id="dock-user" onclick="handleUserClick(this)"><span class="dock-icon">👤</span><span class="dock-text">登录</span></div>
        </div>
    </div>

    <div class="theme-menu" id="themeMenu">
        <div class="menu-item" onclick="setTheme('auto')" id="m-auto">自动</div>
        <div class="menu-item" onclick="setTheme('light')" id="m-light">亮色</div>
        <div class="menu-item" onclick="setTheme('dark')" id="m-dark">暗色</div>
    </div>

    <div class="login-modal" id="loginModal">
        <div class="login-card">
            <h3 id="loginTitle">用户登录</h3>
            <div id="normalLogin">
                <input type="text" id="userIn" placeholder="用户名">
                <button class="btn-main" onclick="doLogin()">进入</button>
                <p style="margin-top:15px; font-size:12px; opacity:0.5;" onclick="toggleAdminView()">管理员登录选项</p>
            </div>
            <div id="adminLogin" style="display:none;">
                <input type="password" id="adminKey" placeholder="管理员密钥 (admin)">
                <button class="btn-main" onclick="doAdminLogin()">验证管理员</button>
                <p style="margin-top:15px; font-size:12px; opacity:0.5;" onclick="toggleAdminView()">返回普通登录</p>
            </div>
            <p style="margin-top:15px; font-size:12px; opacity:0.5;" onclick="closeLogin()">取消</p>
        </div>
    </div>

    <div class="drawer-mask" id="mask" onclick="closeArticle()"></div>
    <div class="drawer" id="drawer">
        <div class="drawer-handle" onclick="closeArticle()"></div>
        <div class="drawer-header">
            <h2 id="d-title">标题</h2>
            <div style="display:flex; gap:10px;">
                <div class="glass-btn" style="width:auto; padding:0 15px; font-size:12px;" onclick="toggleFull()" id="fullBtn">全屏</div>
                <div class="glass-btn" style="color:#ff3b30;" onclick="closeArticle()">✕</div>
            </div>
        </div>
        <div class="drawer-content" id="d-content">内容载入中...</div>
    </div>

    <script>
        const user = "nailong78", repo = "nailong78.github.io";

        // 主题系统
        function setTheme(m) {
            localStorage.setItem('blog-mode', m); applyTheme();
            document.getElementById('themeMenu').style.display = 'none';
        }
        function applyTheme() {
            const m = localStorage.getItem('blog-mode') || 'auto';
            const isDark = m === 'dark' || (m === 'auto' && (new Date().getHours() >= 18 || new Date().getHours() < 6));
            document.body.classList.toggle('light-mode', !isDark);
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            document.getElementById('m-'+m).classList.add('active');
        }

        // 导航系统
        function navTo(page, el) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            document.getElementById('page-'+page).style.display = 'block';
            document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        // 用户系统
        function handleUserClick(el) {
            if(!localStorage.getItem('user')) {
                document.getElementById('loginModal').style.display = 'flex';
            } else { navTo('me', el); }
        }
        function closeLogin() { document.getElementById('loginModal').style.display = 'none'; }
        function toggleAdminView() {
            const isN = document.getElementById('normalLogin').style.display === 'none';
            document.getElementById('normalLogin').style.display = isN ? 'block' : 'none';
            document.getElementById('adminLogin').style.display = isN ? 'none' : 'block';
        }
        function doLogin() { success(document.getElementById('userIn').value || "访客", false); }
        function doAdminLogin() {
            if(document.getElementById('adminKey').value === 'admin') success("奶龙", true);
            else alert("密钥错误");
        }
        function success(u, a) {
            localStorage.setItem('user', u); localStorage.setItem('isAdmin', a);
            location.reload();
        }
        function logout() { localStorage.clear(); location.reload(); }

        // 文章交互 (从点击处弹出的感觉)
        async function openArticle(name) {
            const d = document.getElementById('drawer');
            const m = document.getElementById('mask');
            document.getElementById('d-title').innerText = name.replace('.txt','');
            document.getElementById('d-content').innerText = "加载中...";
            m.style.display = 'block'; setTimeout(()=>m.style.opacity='1',10);
            d.classList.add('show');
            const res = await fetch(`posts/${name}`);
            document.getElementById('d-content').innerText = await res.text();
        }
        function closeArticle() {
            const d = document.getElementById('drawer');
            const m = document.getElementById('mask');
            d.classList.remove('show'); d.classList.remove('full');
            m.style.opacity = '0'; setTimeout(()=>m.style.display='none',400);
        }
        function toggleFull() {
            const d = document.getElementById('drawer');
            d.classList.toggle('full');
            document.getElementById('fullBtn').innerText = d.classList.contains('full') ? "还原" : "全屏";
        }

        // 数据加载
        async function init() {
            applyTheme();
            const pRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts`);
            if(pRes.ok) {
                const data = await pRes.json();
                const list = document.getElementById('post-list');
                data.filter(f => f.name.endsWith('.txt')).forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'glass-card';
                    card.innerHTML = `<h3>${file.name.replace('.txt','')}</h3><p style="font-size:12px; opacity:0.5; margin-top:8px;">阅读全文</p>`;
                    card.onclick = () => openArticle(file.name);
                    list.appendChild(card);
                });
            }
            const aRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/apps`);
            if(aRes.ok) {
                const data = await aRes.json();
                const list = document.getElementById('app-list');
                data.forEach(f => {
                    const isPy = f.name.endsWith('.py');
                    list.innerHTML += `<a href="${isPy ? 'python_runner.html?file='+f.name : 'apps/'+f.name}" class="app-item"><div class="app-box">${isPy?'🐍':'🌐'}</div><span style="font-size:11px; font-weight:600;">${f.name.split('.')[0]}</span></a>`;
                });
            }
            if(localStorage.getItem('user')) {
                document.getElementById('dock-user').querySelector('.dock-text').innerText = "中心";
                document.getElementById('meName').innerText = "你好，" + localStorage.getItem('user');
                if(localStorage.getItem('isAdmin') === 'true') document.getElementById('adminArea').style.display = 'block';
            }
        }

        function jello() { 
            const a = document.getElementById('avatar'); 
            a.style.transform = 'scale(1.2)'; 
            setTimeout(()=>a.style.transform='scale(1)',200);
            if(navigator.vibrate) navigator.vibrate(10);
        }

        function toggleThemeMenu() { 
            const m = document.getElementById('themeMenu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        window.onload = init;
        fetch('https://v1.hitokoto.cn?c=e').then(res=>res.json()).then(d=>document.getElementById('hitokoto').innerText = d.hitokoto);
    </script>
</body>
</html>
