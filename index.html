<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>奶龙的个人博客</title>
    <style>
        :root {
            --bg-color: #050505; --text-main: #ffffff; --text-sub: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.1); --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #0A84FF; --card-bg: rgba(28, 28, 30, 0.8);
        }
        body.light-mode {
            --bg-color: #F2F2F7; --text-main: #000000; --text-sub: rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(0, 0, 0, 0.05); --glass-border: rgba(0, 0, 0, 0.1);
            --card-bg: rgba(255, 255, 255, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow: hidden; transition: 0.5s; }

        /* 背景特效 */
        .bg-glow { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 0% 0%, rgba(120,0,255,0.15) 0%, transparent 50%), radial-gradient(circle at 100% 100%, rgba(0,100,255,0.15) 0%, transparent 50%); }

        .container { height: 100vh; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; padding-bottom: 120px; }

        /* 顶部栏 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .glass-btn { width: 42px; height: 42px; border-radius: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        /* 主题菜单 */
        .theme-menu { position: absolute; top: 70px; right: 20px; background: var(--glass-bg); backdrop-filter: blur(30px); border-radius: 18px; border: 1px solid var(--glass-border); padding: 5px; display: none; flex-direction: column; z-index: 1000; width: 120px; }
        .menu-item { padding: 10px 15px; border-radius: 12px; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .menu-item.active { color: var(--accent); }
        .menu-item.active::after { content: '✓'; font-weight: bold; }

        /* 文章卡片 */
        .post-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(10px); transition: 0.3s; cursor: pointer; }
        .post-card:active { transform: scale(0.96); }

        /* iOS 26 半屏文章小窗 */
        .article-drawer { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 75vh; 
            background: var(--card-bg); backdrop-filter: blur(40px); 
            border-radius: 30px 30px 0 0; border: 1px solid var(--glass-border);
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            z-index: 2000; padding: 20px; display: flex; flex-direction: column;
        }
        .article-drawer.full { height: 100vh; border-radius: 0; }
        .article-drawer.show { transform: translateY(0); }
        .drawer-handle { width: 40px; height: 5px; background: var(--text-sub); border-radius: 10px; margin: 0 auto 20px; cursor: pointer; }
        .drawer-tools { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 10px; }
        .tool-btn { padding: 8px 15px; border-radius: 100px; background: var(--glass-bg); font-size: 12px; font-weight: 600; }
        .drawer-content { overflow-y: auto; flex: 1; line-height: 1.8; font-size: 17px; }

        /* 底部图标导航 */
        .dock { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid var(--glass-border);
            padding: 8px 12px; border-radius: 35px; display: flex; gap: 5px; align-items: center; z-index: 1500;
        }
        .dock-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 15px; border-radius: 20px; transition: 0.3s; opacity: 0.5; min-width: 60px; }
        .dock-item.active { opacity: 1; background: rgba(255,255,255,0.1); }
        .dock-icon { font-size: 20px; }
        .dock-label { font-size: 10px; font-weight: 600; }
        .dock-sep { width: 1px; height: 25px; background: var(--glass-border); margin: 0 5px; }

        /* 弹窗输入 */
        .prompt-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 3000; }
        .prompt-card { width: 85%; max-width: 300px; background: var(--card-bg); border-radius: 25px; padding: 25px; text-align: center; border: 1px solid var(--glass-border); }
        .prompt-input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.1); color: var(--text-main); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container" id="mainContainer">
        <div class="top-bar">
            <div>
                <h1 style="font-size: 20px; font-weight: 800;">奶龙的个人博客</h1>
                <p id="hitokoto" style="font-size: 12px; opacity: 0.5;">正在捕捉灵感...</p>
            </div>
            <div class="glass-btn" onclick="toggleThemeMenu()">🌓</div>
        </div>

        <div id="page-home" class="page-content">
            <div style="text-align:center; margin-bottom:30px;">
                <img src="https://github.com/nailong78.png" id="avatar" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--glass-border);" onclick="jello()">
            </div>
            <div id="post-list"></div>
        </div>
        
        <div id="page-app" class="page-content" style="display:none;">
            <div id="app-list" style="display:grid; grid-template-columns:repeat(3,1fr); gap:15px;"></div>
        </div>
    </div>

    <div class="theme-menu" id="themeMenu">
        <div class="menu-item" onclick="setTheme('auto')" id="m-auto">自动</div>
        <div class="menu-item" onclick="setTheme('light')" id="m-light">亮色</div>
        <div class="menu-item" onclick="setTheme('dark')" id="m-dark">暗色</div>
    </div>

    <div class="article-drawer" id="articleDrawer">
        <div class="drawer-handle" onclick="closeArticle()"></div>
        <div class="drawer-tools">
            <div class="tool-btn" onclick="toggleFullScreen()" id="fullBtn">全屏</div>
            <div class="tool-btn" onclick="closeArticle()" style="background:rgba(255,59,48,0.2); color:#ff3b30;">关闭</div>
        </div>
        <h2 id="drawerTitle" style="margin-bottom:15px;">标题</h2>
        <div class="drawer-content" id="drawerContent">内容加载中...</div>
    </div>

    <div class="dock">
        <div class="dock-item active" onclick="navTo('home', this)">
            <span class="dock-icon">🏠</span>
            <span class="dock-label">首页</span>
        </div>
        <div class="dock-item" onclick="navTo('app', this)">
            <span class="dock-icon">🚀</span>
            <span class="dock-label">应用</span>
        </div>
        <div class="dock-sep"></div>
        <div class="dock-item" onclick="alert('个人中心开发中')">
            <span class="dock-icon">👤</span>
            <span class="dock-label">我的</span>
        </div>
    </div>

    <script>
        const user = "nailong78", repo = "nailong78.github.io";

        // 主题逻辑
        function setTheme(m) {
            localStorage.setItem('blog-mode', m);
            applyTheme();
            document.getElementById('themeMenu').style.display = 'none';
        }
        function applyTheme() {
            const m = localStorage.getItem('blog-mode') || 'auto';
            const isDark = m === 'dark' || (m === 'auto' && (new Date().getHours() >= 18 || new Date().getHours() < 6));
            document.body.classList.toggle('light-mode', !isDark);
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            document.getElementById('m-'+m).classList.add('active');
        }

        function toggleThemeMenu() {
            const m = document.getElementById('themeMenu');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }

        // 导航逻辑
        function navTo(p, el) {
            document.querySelectorAll('.page-content').forEach(pc => pc.style.display = 'none');
            document.getElementById('page-'+p).style.display = 'block';
            document.querySelectorAll('.dock-item').forEach(di => di.classList.remove('active'));
            el.classList.add('active');
        }

        // 文章交互：半屏弹窗
        async function openArticle(fileName) {
            const drawer = document.getElementById('articleDrawer');
            document.getElementById('drawerTitle').innerText = fileName.replace('.txt','');
            document.getElementById('drawerContent').innerText = "加载中...";
            drawer.classList.add('show');
            
            const res = await fetch(`posts/${fileName}`);
            const text = await res.text();
            document.getElementById('drawerContent').innerText = text;
        }

        function closeArticle() {
            const drawer = document.getElementById('articleDrawer');
            drawer.classList.remove('show');
            drawer.classList.remove('full');
            document.getElementById('fullBtn').innerText = "全屏";
        }

        function toggleFullScreen() {
            const drawer = document.getElementById('articleDrawer');
            drawer.classList.toggle('full');
            document.getElementById('fullBtn').innerText = drawer.classList.contains('full') ? "还原" : "全屏";
        }

        // 自动加载内容
        async function loadData() {
            const pRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts`);
            if(pRes.ok) {
                const data = await pRes.json();
                const list = document.getElementById('post-list');
                data.filter(f => f.name.endsWith('.txt')).forEach(file => {
                    const card = document.createElement('div');
                    card.className = 'post-card';
                    card.innerHTML = `<h3>${file.name.replace('.txt','')}</h3><p style="font-size:12px; opacity:0.5; margin-top:8px;">查看详情</p>`;
                    card.onclick = () => openArticle(file.name);
                    list.appendChild(card);
                });
            }

            const aRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/apps`);
            if(aRes.ok) {
                const data = await aRes.json();
                const list = document.getElementById('app-list');
                data.forEach(file => {
                    list.innerHTML += `<div class="post-card" style="text-align:center;">
                        <div style="font-size:30px; margin-bottom:10px;">${file.name.endsWith('.py')?'🐍':'🌐'}</div>
                        <div style="font-size:12px;">${file.name.split('.')[0]}</div>
                    </div>`;
                });
            }
        }

        window.onload = () => {
            applyTheme();
            loadData();
            fetch('https://v1.hitokoto.cn?c=e').then(res=>res.json()).then(d=>document.getElementById('hitokoto').innerText = d.hitokoto);
        };
    </script>
</body>
</html>
