<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>奶龙的个人博客</title>
    <style>
        :root {
            --bg-color: #050505; --text-main: #ffffff; --text-sub: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.12);
            --blob-1: rgba(120, 0, 255, 0.3); --blob-2: rgba(0, 100, 255, 0.3);
            --accent: #0A84FF;
        }
        body.light-mode {
            --bg-color: #f2f4f6; --text-main: #1a1a1a; --text-sub: rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.8);
            --blob-1: rgba(255, 100, 200, 0.2); --blob-2: rgba(0, 200, 255, 0.2);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; background: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; padding-bottom: 110px; transition: background 0.6s ease; }
        
        .background-blob { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; filter: blur(60px); }
        .blob { position: absolute; border-radius: 50%; width: 250px; height: 250px; animation: move 20s infinite alternate linear; }
        .blob-1 { top: -5%; left: -5%; background: var(--blob-1); }
        .blob-2 { bottom: 10%; right: -5%; background: var(--blob-2); }
        @keyframes move { from { transform: translate3d(0,0,0); } to { transform: translate3d(40px, 60px, 0); } }

        .container { width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; }
        
        /* 顶部栏 */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; height: 44px;}
        .site-title { font-size: 18px; font-weight: 800; }
        #hitokoto { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
        .theme-btn { width: 44px; height: 44px; border-radius: 14px; background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }

        /* 头像模块 */
        .profile-card { text-align: center; margin-bottom: 25px; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid var(--glass-border); margin-bottom: 12px; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .avatar:hover { transform: scale(1.05) rotate(5deg); }

        /* 卡片与网格 */
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 22px; margin-bottom: 15px; transition: 0.3s cubic-bezier(0.2, 0, 0, 1); }
        .glass-card:active { transform: scale(0.98); opacity: 0.9; }
        .page { transition: 0.5s; }
        .page.hidden { display: none; opacity: 0; }
        .app-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .app-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: inherit; gap: 8px; }
        .app-icon { width: 64px; height: 64px; background: var(--glass-bg); border-radius: 18px; border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-size: 28px; }

        /* 底部导航 */
        .dock-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); padding: 5px; border-radius: 100px; display: flex; z-index: 100; }
        .dock-item { padding: 10px 22px; cursor: pointer; font-size: 13px; font-weight: 600; opacity: 0.5; transition: 0.3s; z-index: 2; position: relative; }
        .dock-item.active { opacity: 1; }
        .dock-slider { position: absolute; top: 5px; left: 5px; height: calc(100% - 10px); background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); z-index: 1; }
        body.light-mode .dock-slider { background: rgba(0,0,0,0.06); }
    </style>
</head>
<body>
    <div class="background-blob"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
    
    <div class="container">
        <div class="top-bar">
            <div><div class="site-title">奶龙的个人博客</div><div id="hitokoto">读取中...</div></div>
            <div class="theme-btn" id="themeBtn">🌓</div>
        </div>

        <div id="main-content" class="page">
            <div class="profile-card">
                <img src="https://github.com/nailong78.png" class="avatar">
                <h2 style="font-size: 22px; font-weight: 800;">奶龙</h2>
                <p style="font-size: 13px; opacity: 0.5; margin-top: 4px;">数字游民 / 审美驱动开发者</p>
            </div>
            <div id="post-list"></div>
        </div>

        <div id="app-content" class="page hidden">
            <div class="glass-card" style="margin-top: 20px;">
                <h3 style="margin-bottom: 15px; font-size: 16px;">我的应用库</h3>
                <div class="app-grid" id="app-list"></div>
            </div>
        </div>

        <div id="about-content" class="page hidden">
            <div class="glass-card" style="margin-top: 20px;">
                <h3>关于本站</h3>
                <p style="margin-top:10px; opacity:0.7; line-height: 1.6; font-size: 14px;">iOS 26 实验室。全自动化文件驱动系统，通过 GitHub API 实时识别 posts 和 apps 文件夹内容。</p>
            </div>
        </div>
    </div>

    <div class="dock-container">
        <div class="dock-slider" id="dockSlider"></div>
        <div id="nav-home" class="dock-item active">首页</div>
        <div id="nav-app" class="dock-item">应用</div>
        <div id="nav-about" class="dock-item">关于</div>
    </div>

    <script>
        const user = "nailong78", repo = "nailong78.github.io";

        // 主题同步核心逻辑
        function applyTheme() {
            let mode = localStorage.getItem('blog-mode') || 'auto';
            const isNight = new Date().getHours() >= 18 || new Date().getHours() < 6;
            const isLight = mode === 'light' || (mode === 'auto' && !isNight);
            document.body.classList.toggle('light-mode', isLight);
            document.getElementById('themeBtn').innerText = isLight ? '☀️' : '🌙';
        }

        document.getElementById('themeBtn').onclick = () => {
            let current = localStorage.getItem('blog-mode') || 'auto';
            let next = (current === 'light') ? 'dark' : 'light';
            localStorage.setItem('blog-mode', next);
            applyTheme();
        };

        // 自动化列表
        async function loadData() {
            // 获取文章
            const pRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts`);
            if (pRes.ok) {
                const data = await pRes.json();
                const list = document.getElementById('post-list');
                data.filter(f => f.name.endsWith('.txt')).forEach(file => {
                    list.innerHTML += `
                        <a href="post.html?file=${encodeURIComponent(file.name)}" style="text-decoration:none; color:inherit;">
                            <div class="glass-card">
                                <h3 style="font-size:17px;">${file.name.replace('.txt','')}</h3>
                                <p style="font-size:12px; opacity:0.5; margin-top:6px;">点击进入沉浸式阅读模式</p>
                            </div>
                        </a>`;
                });
            }
            // 获取应用
            const aRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/apps`);
            if (aRes.ok) {
                const data = await aRes.json();
                const list = document.getElementById('app-list');
                data.forEach(file => {
                    const isPy = file.name.endsWith('.py');
                    const url = isPy ? `python_runner.html?file=${encodeURIComponent(file.name)}` : `apps/${file.name}`;
                    list.innerHTML += `
                        <a href="${url}" class="app-item">
                            <div class="app-icon">${isPy ? '🐍' : '🌐'}</div>
                            <span>${file.name.split('.')[0]}</span>
                        </a>`;
                });
            }
        }

        // 导航滑块
        const slider = document.getElementById('dockSlider');
        function switchPage(id, nav) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.dock-item').forEach(d => d.classList.remove('active'));
            nav.classList.add('active');
            slider.style.width = nav.offsetWidth + 'px';
            slider.style.transform = `translateX(${nav.offsetLeft - 5}px)`;
        }
        document.getElementById('nav-home').onclick = function(){ switchPage('main-content', this); }
        document.getElementById('nav-app').onclick = function(){ switchPage('app-content', this); }
        document.getElementById('nav-about').onclick = function(){ switchPage('about-content', this); }

        window.onload = () => { switchPage('main-content', document.getElementById('nav-home')); applyTheme(); loadData(); };
        fetch('https://v1.hitokoto.cn?c=e').then(res => res.json()).then(d => { if(d.hitokoto.length <= 15) document.getElementById('hitokoto').innerText = d.hitokoto; });
    </script>
</body>
</html>
