<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的个人博客</title>
    <style>
        /* 全局重置与字体 - 使用系统默认字体栈以贴合iOS感 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: #000; /* 深色底，凸显玻璃感 */
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* 动态液态背景 (Mesh Gradient) */
        .background-blob {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            filter: blur(60px); /* 制造液态晕染效果 */
            animation: breathe 10s ease-in-out infinite alternate;
        }
        
        /* 增加流动的光斑 */
        .orb {
            position: absolute;
            width: 300px; height: 300px;
            background: linear-gradient(180deg, #00d2ff 0%, #3a7bd5 100%);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 8s ease-in-out infinite;
            top: 10%; left: -50px;
            z-index: -1;
        }

        /* 容器：手机优先布局 */
        .container {
            width: 100%;
            max-width: 450px; /* 限制最大宽度，模拟手机界面 */
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* 核心：iOS 液态玻璃卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.1); /* 极低透明度的白 */
            backdrop-filter: blur(25px) saturate(180%); /* 毛玻璃 + 色彩增益 */
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2); /* 细微的高光边框 */
            border-radius: 24px; /* iOS 风格大圆角 */
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* 标题样式 */
        h1 { font-weight: 700; font-size: 28px; letter-spacing: -0.5px; margin-bottom: 8px; }
        p { font-size: 16px; line-height: 1.5; color: rgba(255, 255, 255, 0.8); }

        /* 动画关键帧 */
        @keyframes float { 
            0% { transform: translate(0, 0); } 
            50% { transform: translate(30px, 50px); } 
            100% { transform: translate(0, 0); } 
        }
    </style>
</head>
<body>

    <div class="background-blob"></div>
    <div class="orb"></div>

    <div class="container">
        
        <div class="glass-card">
            <h1>Hello, World</h1>
            <p>这是我的个人博客，全 GitHub 构建。</p>
        </div>

        <div class="glass-card">
            <div style="font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 10px;">2026-01-09</div>
            <h3>第一篇博客文章</h3>
            <p style="margin-top: 8px;">这里是文章简介，测试液态玻璃效果...</p>
        </div>

    </div>

</body>
</html>
