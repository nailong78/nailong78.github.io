<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>奶龙的个人博客</title>
    <style>
        :root {
            --bg: #0b0b0c; --card: rgba(30,30,32,0.7); --text: #fff; --sub: #8e8e93;
            --glass: rgba(255,255,255,0.1); --border: rgba(255,255,255,0.15); --accent: #0A84FF;
        }
        body.light-mode {
            --bg: #f2f2f7; --card: rgba(255,255,255,0.7); --text: #000; --sub: #8a8a8e;
            --glass: rgba(0,0,0,0.05); --border: rgba(0,0,0,0.08);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .container { padding: 20px 20px 100px; max-width: 600px; margin: 0 auto; transform: translateZ(0); }
        
        /* 导航头 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .mode-btn { width: 42px; height: 42px; border-radius: 12px; background: var(--glass); border: 1px solid var(--border); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; }

        /* 内容卡片 */
        .glass-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; backdrop-filter: blur(15px); transition: 0.2s; }
        .glass-card:active { transform: scale(0.97); }

        /* 公告弹窗 - iOS 26 玻璃特效 */
        .modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); display: none; z-index: 9999; opacity: 0; transition: 0.4s; align-items: center; justify-content: center; }
        .modal-box { 
            width: 85%; max-width: 320px; background: var(--card); border: 1px solid var(--border); 
            border-radius: 30px; padding: 25px; text-align: center; transform: scale(0.85); transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .modal-mask.show { display: flex; opacity: 1; }
        .modal-mask.show .modal-box { transform: scale(1); }

        /* 底部导航 */
        .dock { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--card); backdrop-filter: blur(30px); border: 1px solid var(--border); border-radius: 32px; display: flex; padding: 6px 15px; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .dock-item { display: flex; flex-direction: column; align-items: center; width: 70px; padding: 5px 0; opacity: 0.4; transition: 0.3s; cursor: pointer; }
        .dock-item.active { opacity: 1; transform: translateY(-3px); }
        .dock-icon { font-size: 20px; margin-bottom: 2px; }
        .dock-text { font-size: 10px; font-weight: 700; }

        .btn-close { background: var(--accent); color: #fff; border: none; padding: 12px 30px; border-radius: 15px; font-weight: bold; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1 style="font-size: 24px; font-weight: 800; letter-spacing: -1px;">奶龙的个人博客</h1>
            <p id="hitokoto" style="font-size:11px; opacity:0.5; margin-top:4px;"></p>
        </div>
        <div class="mode-btn" onclick="toggleMode()">🌓</div>
    </div>

    <div id="p-home" class="page">
        <div style="text-align:center; margin-bottom:30px;">
            <img src="https://github.com/nailong78.png" style="width:85px; height:85px; border-radius:50%; border:2px solid var(--border);" onclick="this.style.transform='scale(1.2)';setTimeout(()=>this.style.transform='scale(1)',200)">
        </div>
        <div id="post-list"></div>
    </div>

    <div id="p-about" class="page" style="display:none;">
        <div class="glass-card">
            <h2 style="margin-bottom:10px;">关于本站</h2>
            <p style="font-size:15px; line-height:1.6; opacity:0.8;">这里是奶龙的灵感实验室。基于 iOS 26 玻璃拟态美学构建，追求极致的静态阅读体验。</p>
            <div style="margin-top:20px; padding-top:20px; border-top:1px solid var(--border);">
                <p style="font-size:12px; color:var(--sub);">Framework: Vanilla JS / CSS 4.0</p>
                <p style="font-size:12px; color:var(--sub);">Design: iOS 26 Glassmorphism</p>
            </div>
        </div>
    </div>
</div>

<div class="modal-mask" id="notice-mask">
    <div class="modal-box">
        <div style="font-size:30px; margin-bottom:10px;">📢</div>
        <h3 id="notice-title" style="margin-bottom:10px;">系统公告</h3>
        <div id="notice-content" style="font-size:14px; opacity:0.7; line-height:1.6; max-height:200px; overflow-y:auto;">加载中...</div>
        <button class="btn-close" onclick="closeNotice()">知道了</button>
    </div>
</div>

<div class="dock">
    <div class="dock-item active" onclick="nav('home', this)">
        <span class="dock-icon">🏠</span><span class="dock-text">首页</span>
    </div>
    <div class="dock-item" onclick="nav('about', this)">
        <span class="dock-icon">ℹ️</span><span class="dock-text">关于</span>
    </div>
</div>

<script>
    const user = "nailong78", repo = "nailong78.github.io";

    // 路由
    const nav = (p, el) => {
        document.querySelectorAll('.page').forEach(s => s.style.display = 'none');
        document.getElementById('p-'+p).style.display = 'block';
        document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    };

    // 主题
    const toggleMode = () => {
        const isL = document.body.classList.toggle('light-mode');
        localStorage.setItem('mode', isL ? 'light' : 'dark');
    };

    // 弹窗控制
    const closeNotice = () => {
        const m = document.getElementById('notice-mask');
        m.classList.remove('show');
        setTimeout(() => m.style.display = 'none', 400);
    };

    const init = async () => {
        if(localStorage.getItem('mode') === 'light') document.body.classList.add('light-mode');

        // 加载公告 (announcement/notice.txt)
        try {
            const r = await fetch('announcement/notice.txt');
            if(r.ok) {
                document.getElementById('notice-content').innerText = await r.text();
                const m = document.getElementById('notice-mask');
                m.style.display = 'flex';
                setTimeout(() => m.classList.add('show'), 50);
            }
        } catch(e) { console.log("无公告"); }

        // 加载文章
        const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts`);
        if(res.ok) {
            const data = await res.json();
            const list = document.getElementById('post-list');
            data.filter(f => f.name.endsWith('.txt')).forEach(f => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.innerHTML = `<h3>${f.name.replace('.txt','')}</h3><p style="font-size:12px; opacity:0.4; margin-top:8px;">阅读全文</p>`;
                card.onclick = async () => {
                    const postRes = await fetch(`posts/${f.name}`);
                    const text = await postRes.text();
                    document.getElementById('notice-title').innerText = f.name.replace('.txt','');
                    document.getElementById('notice-content').innerText = text;
                    document.getElementById('notice-mask').style.display = 'flex';
                    setTimeout(() => document.getElementById('notice-mask').classList.add('show'), 50);
                };
                list.appendChild(card);
            });
        }
        
        // 每日一言
        fetch('https://v1.hitokoto.cn?c=e').then(r=>r.json()).then(d=>document.getElementById('hitokoto').innerText=d.hitokoto);
    };

    window.onload = init;
</script>
</body>
</html>
