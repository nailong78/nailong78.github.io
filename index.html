<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>奶龙的个人博客</title>
    <style>
        :root {
            --bg: #F2F2F7;
            --glass-light: rgba(255, 255, 255, 0.7);
            --glass-heavy: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.08);
            --accent: #007AFF;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #000; overflow-x: hidden; }
        
        .container { padding: 20px 20px 140px; max-width: 600px; margin: 0 auto; }
        .header { margin-bottom: 35px; }
        .site-title { font-size: 28px; font-weight: 800; letter-spacing: -1.2px; }

        .glass-card { 
            background: var(--glass-light); border: 1px solid var(--border); border-radius: 24px; 
            padding: 22px; margin-bottom: 15px; backdrop-filter: blur(15px);
            transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1);
        }
        .glass-card:active { transform: scale(0.96); }

        /* iOS 26 液态弹窗 */
        .win-mask { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(20px); 
            display: none; z-index: 9000; opacity: 0; transition: 0.4s; align-items: center; justify-content: center;
        }
        .win-modal { 
            width: 90%; max-width: 450px; height: 75vh; background: var(--glass-heavy); 
            border: 1px solid rgba(255,255,255,0.5); border-radius: 38px;
            display: flex; flex-direction: column; padding: 25px;
            transform: scale(0.9) translateY(30px); transition: 0.5s cubic-bezier(0.1, 1, 0.2, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        }
        .win-modal.full { width: 100% !important; height: 100% !important; max-width: none !important; border-radius: 0 !important; }
        .win-mask.show { display: flex; opacity: 1; }
        .win-mask.show .win-modal { transform: scale(1) translateY(0); }

        .win-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .win-btns { display: flex; gap: 8px; }
        .glass-btn { 
            padding: 6px 12px; border-radius: 14px; background: rgba(0,0,0,0.05); 
            border: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; gap: 5px;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .glass-btn:active { background: rgba(0,0,0,0.1); transform: scale(0.95); }

        .win-body { overflow-y: auto; flex: 1; line-height: 1.8; font-size: 17px; color: #1d1d1f; text-align: left; }
        .win-body img { display: block; width: 100%; height: auto; border-radius: 18px; margin: 15px 0; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

        /* 1:1 iOS 26 液态 Dock */
        .dock-wrapper { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 8000; }
        .dock { 
            position: relative; display: flex; padding: 10px 20px; gap: 12px;
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(40px) saturate(200%) brightness(1.1);
            border: 1px solid rgba(255,255,255,0.6); border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .dock::before { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%); pointer-events: none; }
        .dock-item { display: flex; flex-direction: column; align-items: center; width: 70px; opacity: 0.4; transition: 0.3s; cursor: pointer; position: relative; z-index: 1; }
        .dock-item.active { opacity: 1; transform: translateY(-2px); }
        .dock-text { font-size: 10px; font-weight: 700; margin-top: 3px; }

        .confirm-area { text-align: center; padding-top: 20px; border-top: 1px solid var(--border); margin-top: 10px; }
        .confirm-btn { background: var(--accent); color: #fff; border: none; padding: 14px 45px; border-radius: 18px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .confirm-btn:active { transform: scale(0.95); opacity: 0.9; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="site-title">奶龙的个人博客</h1>
        <p id="hitokoto" style="font-size:11px; opacity:0.6; margin-top:6px; font-weight:500;">载入中...</p>
    </div>

    <div id="p-home" class="page">
        <div style="text-align:center; margin-bottom:40px;">
            <img src="https://github.com/nailong78.png" style="width:85px; height:85px; border-radius:50%; border:3px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.06);" onclick="this.style.transform='scale(1.15)';setTimeout(()=>this.style.transform='scale(1)',200)">
        </div>
        <div id="post-list"></div>
    </div>

    <div id="p-about" class="page" style="display:none;">
        <div class="glass-card">
            <h2 style="margin-bottom:12px;">关于本站</h2>
            <p style="font-size:16px; line-height:1.7; opacity:0.8;">遵循 iOS 26 规范设计。公告与文章现已采用统一的高沉浸感阅读布局。</p>
        </div>
    </div>
</div>

<div class="win-mask" id="win-mask">
    <div class="win-modal" id="win-modal">
        <div class="win-header" id="win-header">
            <h3 id="win-title" style="font-size:20px; font-weight:700;"></h3>
            <div class="win-btns" id="win-ctrls">
                <div class="glass-btn" onclick="toggleFull()"><span>🔳</span><span>全屏</span></div>
                <div class="glass-btn" onclick="closeWin()" style="color:#FF3B30;"><span>✕</span><span>关闭</span></div>
            </div>
        </div>
        <div id="win-body" class="win-body"></div>
        <div id="win-footer" class="confirm-area" style="display:none;">
            <button class="confirm-btn" onclick="closeWin()">确认接收</button>
        </div>
    </div>
</div>

<div class="dock-wrapper">
    <div class="dock">
        <div class="dock-item active" onclick="nav('home', this)"><span style="font-size:22px;">🏠</span><span class="dock-text">首页</span></div>
        <div class="dock-item" onclick="nav('about', this)"><span style="font-size:22px;">ℹ️</span><span class="dock-text">关于</span></div>
    </div>
</div>

<script>
    const user = "nailong78", repo = "nailong78.github.io";
    const v = () => `?v=${new Date().getTime()}`;

    const nav = (p, el) => {
        document.querySelectorAll('.page').forEach(s => s.style.display = 'none');
        document.getElementById('p-'+p).style.display = 'block';
        document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    };

    const parseContent = (text) => {
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        return text.replace(urlRegex, (url) => {
            if (/\.(jpg|jpeg|png|gif|webp)$/i.test(url.split('?')[0])) {
                return `<img src="${url}" alt="Content Image">`;
            }
            return `<a href="${url}" target="_blank" style="color:var(--accent); text-decoration:none; border-bottom:1px solid var(--accent);">查看链接 🔗</a>`;
        }).replace(/\n/g, '<br>');
    };

    const openWin = (title, content, isNotice = false) => {
        const m = document.getElementById('win-mask'), v_mod = document.getElementById('win-modal');
        const b = document.getElementById('win-body'), c = document.getElementById('win-ctrls'), f = document.getElementById('win-footer');
        document.getElementById('win-title').innerText = title;
        
        b.innerHTML = parseContent(content);

        if(isNotice) {
            c.style.display = 'none'; 
            f.style.display = 'block';
            b.style.textAlign = 'left';
        } else {
            c.style.display = 'flex';
            f.style.display = 'none';
        }

        m.style.display = 'flex';
        setTimeout(() => m.classList.add('show'), 50);
    };

    const closeWin = () => {
        const m = document.getElementById('win-mask'), v_mod = document.getElementById('win-modal');
        m.classList.remove('show');
        v_mod.classList.remove('full');
        setTimeout(() => m.style.display = 'none', 400);
    };

    const toggleFull = () => document.getElementById('win-modal').classList.toggle('full');

    const init = async () => {
        fetch('announcement/notice.txt' + v()).then(r => r.text()).then(t => {
            if(t.trim().length > 1) openWin('系统公告', t, true);
        }).catch(() => {});

        try {
            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts` + v());
            if(res.ok) {
                const data = await res.json();
                const list = document.getElementById('post-list');
                data.filter(f => f.name.endsWith('.txt')).forEach(f => {
                    const card = document.createElement('div');
                    card.className = 'glass-card';
                    card.innerHTML = `<h3>${f.name.replace('.txt','')}</h3><p style="font-size:12px; opacity:0.4; margin-top:8px;">点击阅读文章</p>`;
                    card.onclick = async () => {
                        const r = await fetch(`posts/${f.name}` + v());
                        openWin(f.name.replace('.txt',''), await r.text());
                    };
                    list.appendChild(card);
                });
            }
        } catch(e) {}
        
        fetch('https://v1.hitokoto.cn?c=e').then(r=>r.json()).then(d=> {
            document.getElementById('hitokoto').innerText = `[每日一言] ${d.hitokoto}`;
        });
    };

    window.onload = init;
</script>
</body>
</html>
