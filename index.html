<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>奶龙的个人博客</title>
    <style>
        :root {
            --bg: #F2F2F7;
            --glass-light: rgba(255, 255, 255, 0.7);
            --glass-heavy: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.08);
            --accent: #007AFF;
            --ios-liquid: saturate(200%) blur(25px) brightness(1.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #000; overflow-x: hidden; }
        
        .container { padding: 20px 20px 140px; max-width: 600px; margin: 0 auto; }
        .header { margin-bottom: 35px; }
        .site-title { font-size: 28px; font-weight: 800; letter-spacing: -1.2px; }

        .posts-container { background: rgba(255, 255, 255, 0.4); border-radius: 32px; padding: 15px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .container-label { font-size: 13px; font-weight: 700; opacity: 0.5; margin: 15px 0 12px 10px; display: block; }

        .glass-card { 
            background: var(--glass-light); border: 1px solid var(--border); border-radius: 22px; 
            padding: 20px; margin-bottom: 12px; backdrop-filter: blur(15px);
            transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1);
        }
        .glass-card:active { transform: scale(0.97); }
        
        .runtime-card { background: rgba(255, 255, 255, 0.5); backdrop-filter: var(--ios-liquid); -webkit-backdrop-filter: var(--ios-liquid); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 24px; padding: 18px; text-align: center; margin-top: 10px; }
        #runtime-clock { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--accent); font-size: 15px; }

        .post-meta { font-size: 12px; opacity: 0.5; margin-top: 8px; font-weight: 500; display: flex; gap: 12px; }
        .profile-box { text-align: center; padding: 30px 15px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 30px; margin-bottom: 15px; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .social-row { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .social-btn { width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.5); backdrop-filter: var(--ios-liquid); -webkit-backdrop-filter: var(--ios-liquid); border: 0.5px solid rgba(255, 255, 255, 0.4); text-decoration: none; font-size: 20px; transition: 0.2s; }

        .win-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(20px); display: none; z-index: 9000; opacity: 0; transition: 0.4s; align-items: center; justify-content: center; }
        .win-mask.show { display: flex; opacity: 1; }
        
        .win-modal { width: 90%; max-width: 450px; height: 75vh; background: var(--glass-heavy); backdrop-filter: var(--ios-liquid); -webkit-backdrop-filter: var(--ios-liquid); border: 1px solid rgba(255,255,255,0.5); border-radius: 38px; display: flex; flex-direction: column; padding: 25px; transform: scale(0.9) translateY(30px); transition: 0.5s cubic-bezier(0.1, 1, 0.2, 1); }
        .win-modal.full { width: 100% !important; height: 100% !important; max-width: none !important; border-radius: 0 !important; transform: none !important; padding: 0 !important; }
        
        /* 全屏标题栏压缩优化 */
        .win-modal.full .win-header { padding: 12px 20px; margin-bottom: 0; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.2); }
        .win-modal.full .win-body { padding: 20px; }
        .win-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .win-body { overflow-y: auto; flex: 1; line-height: 1.8; font-size: 17px; color: #1d1d1f; }
        .win-body img { display: block; width: 100%; height: auto; border-radius: 18px; margin: 15px 0; cursor: zoom-in; }

        .ios-close-btn { position: absolute; top: 40px; right: 25px; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.45); backdrop-filter: var(--ios-liquid); -webkit-backdrop-filter: var(--ios-liquid); border: 0.5px solid rgba(255, 255, 255, 0.3); z-index: 10002; cursor: pointer; color: #000; }

        #img-viewer { z-index: 10000; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); touch-action: pan-y; flex-direction: column; }
        #img-viewer img { max-width: 100%; max-height: 100%; transition: transform 0.1s ease-out, opacity 0.2s; }
        .img-counter { position: absolute; bottom: 40px; background: rgba(255,255,255,0.2); color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: 600; backdrop-filter: blur(10px); pointer-events: none; }
        .dl-btn { position: absolute; bottom: 85px; background: var(--accent); color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: 600; display: none; cursor: pointer; z-index: 10001; }

        .dock-wrapper { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; z-index: 8000; }
        .dock { display: flex; padding: 10px 20px; gap: 12px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(40px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.6); }
        .dock-item { display: flex; flex-direction: column; align-items: center; width: 70px; opacity: 0.4; transition: 0.3s; }
        .dock-item.active { opacity: 1; transform: translateY(-2px); }
        .dock-text { font-size: 10px; font-weight: 700; margin-top: 3px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 class="site-title">奶龙的个人博客</h1>
        <p id="hitokoto" style="font-size:11px; opacity:0.6; margin-top:6px; font-weight:500;">载入中...</p>
    </div>
    <div id="p-home" class="page">
        <div style="text-align:center; margin-bottom:40px;">
            <img src="https://github.com/nailong78.png" style="width:85px; height:85px; border-radius:50%; border:3px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.06);" onclick="viewImage(0, [this.src])">
        </div>
        <span class="container-label">文章列表</span>
        <div id="post-list" class="posts-container"></div>
        <span class="container-label">安全运行</span>
        <div class="runtime-card"><p style="font-size: 12px; font-weight: 600; opacity: 0.6; margin-bottom: 5px;">本站已安全运行</p><div id="runtime-clock">正在初始化...</div></div>
    </div>
    <div id="p-about" class="page" style="display:none;">
        <div class="posts-container">
            <div class="profile-box">
                <img src="https://github.com/nailong78.png" class="profile-avatar">
                <h2 style="font-weight:800; letter-spacing:-1px;">奶龙 (Nailong)</h2>
                <div class="social-row">
                    <a href="https://github.com/nailong78" target="_blank" class="social-btn">🐱</a>
                    <a href="https://t.me/NL78991" target="_blank" class="social-btn">✈️</a>
                </div>
                <div class="glass-card" style="text-align:left; margin-top:25px;">
                    <p style="font-size:15px; opacity:0.8; line-height:1.6;">👋 镜像加速页：<br><small style="color:var(--accent);">https://cdn.jsdelivr.net/gh/nailong78/nailong78.github.io@main/index.html</small></p>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="win-mask" id="win-mask">
    <div class="win-modal" id="win-modal">
        <div class="win-header">
            <h3 id="win-title" style="font-size:18px; font-weight:700;"></h3>
            <div style="display:flex; gap:8px;">
                <div class="glass-btn" style="padding:6px 12px; background:rgba(0,0,0,0.05); border-radius:12px; cursor:pointer;" onclick="toggleFull()">🔳</div>
                <div class="glass-btn" style="padding:6px 12px; background:rgba(0,0,0,0.05); border-radius:12px; cursor:pointer; color:#FF3B30;" onclick="closeWin()">✕</div>
            </div>
        </div>
        <div id="win-body" class="win-body"></div>
        <div id="win-footer" style="display:none; text-align:center; padding:20px;"><button style="background:var(--accent); color:#fff; border:none; padding:12px 40px; border-radius:15px; font-weight:700;" onclick="closeWin()">确认</button></div>
    </div>
</div>

<div class="win-mask" id="img-viewer" onclick="closeImageViewer()">
    <div class="ios-close-btn" onclick="closeImageViewer()">✕</div>
    <img id="full-img" src="" onclick="event.stopPropagation()">
    <div id="dl-btn" class="dl-btn" onclick="downloadCurrentImg(event)">保存图片</div>
    <div id="img-counter" class="img-counter"></div>
</div>

<div class="dock-wrapper"><div class="dock"><div class="dock-item active" onclick="nav('home', this)"><span>🏠</span><span class="dock-text">首页</span></div><div class="dock-item" onclick="nav('about', this)"><span>👤</span><span class="dock-text">关于</span></div></div></div>

<script>
    const user = "nailong78", repo = "nailong78.github.io";
    const updateRuntime = () => {
        const start = new Date("2026-01-09 21:25:00").getTime(), now = new Date().getTime(), diff = now - start;
        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById("runtime-clock").innerText = `${d}天 ${h}时 ${m}分 ${s}秒`;
    };
    setInterval(updateRuntime, 1000);

    const nav = (p, el) => { document.querySelectorAll('.page').forEach(s => s.style.display = 'none'); document.getElementById('p-'+p).style.display = 'block'; document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); };

    const parseContent = (text) => {
        const urlRegex = /(https?:\/\/[^\s]+|data:image\/[a-zA-Z]+;base64,[^\s]+)/gi;
        const images = [];
        let html = text.replace(urlRegex, (match) => { if (match.startsWith('data:image') || /\.(jpg|jpeg|png|gif|webp)(\?.*)?$/i.test(match)) { images.push(match); return `##IMG_${images.length - 1}##`; } return `<a href="${match}" target="_blank">链接</a>`; });
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>').replace(/_(.*?)_/g, '<span style="text-decoration:underline;">$1</span>').replace(/\{(.*?):(.*?)\}/g, '<span style="color:$1;">$2</span>');
        let finalHtml = html.replace(/\n/g, '<br>');
        images.forEach((src, i) => { finalHtml = finalHtml.replace(`##IMG_${i}##`, `<img src="${src}" onclick="viewImage(${i}, ${JSON.stringify(images).replace(/"/g, '&quot;')})">`); });
        return finalHtml;
    };

    const openWin = (title, content, isNotice = false) => {
        const m = document.getElementById('win-mask'), b = document.getElementById('win-body'), modal = document.getElementById('win-modal');
        document.getElementById('win-title').innerText = title; modal.classList.remove('full');
        b.innerHTML = parseContent(content.replace(/^(日期：|作者：).*\n?/gm, ''));
        document.getElementById('win-ctrls').style.display = isNotice ? 'none' : 'flex';
        document.getElementById('win-footer').style.display = isNotice ? 'block' : 'none';
        m.style.display = 'flex'; setTimeout(() => m.classList.add('show'), 50);
    };

    const closeWin = () => { document.getElementById('win-mask').classList.remove('show'); setTimeout(() => document.getElementById('win-mask').style.display = 'none', 400); };
    const toggleFull = () => document.getElementById('win-modal').classList.toggle('full');
    const viewImage = (index, list) => { document.getElementById('full-img').src = list[index]; document.getElementById('img-viewer').style.display = 'flex'; setTimeout(() => document.getElementById('img-viewer').classList.add('show'), 50); };
    const closeImageViewer = () => { document.getElementById('img-viewer').classList.remove('show'); setTimeout(() => document.getElementById('img-viewer').style.display = 'none', 400); };

    const init = async () => {
        updateRuntime();
        const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts?v=`+Date.now());
        if(res.ok) {
            const data = await res.json();
            const list = document.getElementById('post-list');
            for(const f of data.filter(f => f.name.endsWith('.txt'))) {
                const r = await fetch(`posts/${f.name}?v=`+Date.now()), fullText = await r.text();
                const dM = fullText.match(/^日期：(.*)$/m), aM = fullText.match(/^作者：(.*)$/m);
                const card = document.createElement('div'); card.className = 'glass-card';
                card.innerHTML = `<h3 style="font-size:18px;">${f.name.replace('.txt','')}</h3><div class="post-meta">${dM ? `<span>📅 ${dM[1]}</span>` : ''}${aM ? `<span>✍️ ${aM[1]}</span>` : ''}</div>`;
                card.onclick = () => openWin(f.name.replace('.txt',''), fullText);
                list.appendChild(card);
            }
        }
        fetch('https://v1.hitokoto.cn?c=e').then(r=>r.json()).then(d=>document.getElementById('hitokoto').innerText = `[每日一言] ${d.hitokoto}`);
    };
    window.onload = init;
</script>
</body>
</html>
