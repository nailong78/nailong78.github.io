<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nailong78 的博客</title>
    <style>
        /* === CSS 变量系统：定义两套皮肤 === */
        :root {
            /* 默认暗色模式 (Dark) */
            --bg-color: #050505;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
            
            /* 玻璃卡片：暗色下是微透明白 */
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            
            /* 氛围光：霓虹感 */
            --blob-color-1: rgba(120, 0, 255, 0.5);
            --blob-color-2: rgba(0, 100, 255, 0.5);
        }

        /* 亮色模式 (Light) - 通过 body.light-mode 激活 */
        body.light-mode {
            --bg-color: #f2f4f6; /* 柔和灰白底 */
            --text-main: #1a1a1a;
            --text-sub: rgba(0, 0, 0, 0.6);
            
            /* 玻璃卡片：亮色下是高透加深色阴影 */
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            
            /* 氛围光：糖果色/水彩感 */
            --blob-color-1: rgba(255, 100, 200, 0.4);
            --blob-color-2: rgba(0, 200, 255, 0.4);
        }

        /* === 基础样式 === */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            transition: background-color 0.5s ease, color 0.3s ease; /* 丝滑过渡 */
            padding-bottom: 90px;
        }

        /* === 动态液态背景 === */
        .background-blob {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            overflow: hidden; pointer-events: none;
        }
        .blob {
            position: absolute; border-radius: 50%;
            filter: blur(80px); opacity: 0.8;
            animation: float 10s ease-in-out infinite alternate;
            transition: background 0.5s ease; /* 颜色切换过渡 */
        }
        .blob-1 {
            top: -10%; left: -10%; width: 50vw; height: 50vw;
            background: var(--blob-color-1);
        }
        .blob-2 {
            bottom: 20%; right: -10%; width: 60vw; height: 60vw;
            background: var(--blob-color-2);
            animation-delay: -5s;
        }

        /* === 布局容器 === */
        .container { width: 100%; max-width: 480px; padding: 24px; display: flex; flex-direction: column; gap: 20px; position: relative; z-index: 1; }

        /* === 核心组件：液态玻璃卡片 === */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            box-shadow: var(--glass-shadow);
            transition: all 0.3s ease;
        }
        .glass-card:active { transform: scale(0.98); }

        /* === 顶部栏与切换按钮 === */
        .header-row { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; }
        .theme-toggle {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            font-size: 20px;
        }

        /* === 个人信息 === */
        .profile { text-align: center; padding: 40px 20px; }
        .avatar {
            width: 96px; height: 96px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 16px; object-fit: cover;
        }
        h1 { font-size: 22px; margin-bottom: 8px; font-weight: 700; letter-spacing: -0.5px; }
        .bio { font-size: 15px; color: var(--text-sub); line-height: 1.5; }

        /* === 文章列表 === */
        .post-item { text-decoration: none; color: inherit; display: block; position: relative; }
        .post-date { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; letter-spacing: 0.5px; }
        .post-title { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
        .post-desc { font-size: 14px; color: var(--text-sub); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* === 底部 Dock 栏 === */
        .dock {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            padding: 14px 28px; border-radius: 100px;
            display: flex; gap: 32px; z-index: 100;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .dock a { color: var(--text-main); text-decoration: none; font-size: 14px; font-weight: 600; opacity: 0.6; transition: 0.2s; }
        .dock a.active { opacity: 1; }

        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(20px, 40px); } }
    </style>
</head>
<body>

    <div class="background-blob">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <div class="header-row">
            <button class="theme-toggle" id="themeBtn">🌙</button>
        </div>

        <div class="glass-card profile">
            <img src="https://github.com/nailong78.png" alt="Avatar" class="avatar">
            <h1>Nailong78</h1>
            <p class="bio">Less is More. <br> 探索 iOS 26 液态美学</p>
        </div>

        <a href="#" class="glass-card post-item">
            <div class="post-date">2026.01.09</div>
            <div class="post-title">如何构建液态玻璃风格？</div>
            <div class="post-desc">本文介绍 CSS Backdrop-filter 的高级应用与亮暗模式切换的实现原理。</div>
        </a>

        <a href="#" class="glass-card post-item">
            <div class="post-date">置顶</div>
            <div class="post-title">Hello World</div>
            <div class="post-desc">我的全云端 GitHub 博客正式上线。</div>
        </a>
    </div>

    <div class="dock">
        <a href="#" class="active">首页</a>
        <a href="https://github.com/nailong78">GitHub</a>
        <a href="#">关于</a>
    </div>

    <script>
        // 获取按钮和 Body
        const themeBtn = document.getElementById('themeBtn');
        const body = document.body;

        // 检查是否有保存的主题设置
        if (localStorage.getItem('theme') === 'light') {
            body.classList.add('light-mode');
            themeBtn.textContent = '☀️';
        }

        // 点击切换事件
        themeBtn.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            
            // 判断当前模式并保存到本地存储
            if (body.classList.contains('light-mode')) {
                themeBtn.textContent = '☀️'; // 变成太阳图标
                localStorage.setItem('theme', 'light');
            } else {
                themeBtn.textContent = '🌙'; // 变成月亮图标
                localStorage.setItem('theme', 'dark');
            }
        });
    </script>

</body>
</html>
