<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>奶龙的个人博客</title>
    <style>
        :root {
            --bg: #F2F2F7;
            --glass-light: rgba(255, 255, 255, 0.7);
            --glass-heavy: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.08);
            --accent: #007AFF;
            --ios-liquid: saturate(200%) blur(25px) brightness(1.1);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #000; overflow-x: hidden; }

        .hero-banner {
            position: fixed; top: 0; left: 0; width: 100%; height: 450px;
            background: url('首页背景图.jpeg') no-repeat center center;
            background-size: cover; z-index: -1;
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            will-change: transform;
        }

        .welcome-area { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px 0; margin-top: 10px; }
        .welcome-glow {
            position: absolute; width: 180px; height: 180px;
            background: radial-gradient(circle, rgba(0,122,255,0.4) 0%, transparent 70%);
            filter: blur(20px); pointer-events: none;
            animation: welcome-breath 4s infinite ease-in-out;
        }
        .welcome-text {
            position: relative; color: var(--accent); font-size: 22px; font-weight: 800;
            letter-spacing: 4px; animation: text-breath 4s infinite ease-in-out;
        }
        @keyframes welcome-breath { 0%, 100% { transform: scale(1); opacity: 0.3; } 50% { transform: scale(1.3); opacity: 0.6; } }
        @keyframes text-breath { 0%, 100% { opacity: 0.6; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.05); } }
        
        .container { padding: 40px 20px 140px; max-width: 600px; margin: 0 auto; position: relative; }
        .header { margin-bottom: 20px; }
        .site-title-box { display: flex; align-items: center; gap: 10px; }
        .title-avatar { width: 28px; height: 28px; border-radius: 8px; border: 1.5px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .site-title { font-size: 28px; font-weight: 800; letter-spacing: -1.2px; }

        .posts-container { background: rgba(255, 255, 255, 0.4); border-radius: 32px; padding: 15px; border: 1px solid var(--border); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        .container-label { font-size: 13px; font-weight: 700; opacity: 0.5; margin: 15px 0 12px 10px; display: block; }

        .glass-card { 
            position: relative; overflow: hidden;
            background: var(--glass-light); border: 1px solid var(--border); border-radius: 22px; 
            padding: 20px; margin-bottom: 12px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1); cursor: pointer;
        }
        .glass-card:active { transform: scale(0.97); }
        
        .ripple {
            position: absolute; border-radius: 50%; background: rgba(0, 122, 255, 0.15);
            transform: scale(0); animation: ripple-animation 0.6s linear; pointer-events: none;
        }
        @keyframes ripple-animation { to { transform: scale(4); opacity: 0; } }

        .post-info { display: flex; gap: 10px; margin-top: 8px; font-size: 11px; font-weight: 600; opacity: 0.5; }
        .post-tag { background: rgba(0,0,0,0.05); padding: 2px 8px; border-radius: 6px; }

        .profile-section { text-align: center; padding: 20px 0; }
        .profile-avatar-big { width: 90px; height: 90px; border-radius: 28px; border: 4px solid #fff; box-shadow: 0 12px 30px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .social-group { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .social-item { width: 50px; height: 50px; border-radius: 15px; background: var(--glass-light); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 24px; border: 1px solid var(--border); backdrop-filter: var(--ios-liquid); -webkit-backdrop-filter: var(--ios-liquid); transition: 0.3s; }
        .social-item:active { transform: scale(0.9); }

        .runtime-card { background: rgba(255, 255, 255, 0.5); backdrop-filter: var(--ios-liquid); -webkit-backdrop-filter: var(--ios-liquid); border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 24px; padding: 18px; text-align: center; margin-top: 10px; }
        #runtime-clock { font-variant-numeric: tabular-nums; font-weight: 700; color: var(--accent); font-size: 15px; }

        .win-mask { position: fixed; inset: 0; background: rgba(0,0,0,0.2); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: none; z-index: 9000; opacity: 0; transition: 0.4s; align-items: center; justify-content: center; }
        .win-mask.show { display: flex; opacity: 1; }
        .win-modal { width: 90%; max-width: 450px; height: 75vh; background: var(--glass-heavy); backdrop-filter: var(--ios-liquid); -webkit-backdrop-filter: var(--ios-liquid); border: 1px solid rgba(255,255,255,0.5); border-radius: 38px; display: flex; flex-direction: column; padding: 25px; transform: scale(0.9) translateY(30px); transition: 0.5s cubic-bezier(0.1, 1, 0.2, 1); overflow: hidden; position: relative; }
        .win-modal.full { width: 100% !important; height: 100% !important; border-radius: 0 !important; transform: none !important; padding: 0 !important; }
        .win-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-shrink: 0; z-index: 10; }
        .win-modal.full .win-header { padding: 12px 20px; margin-bottom: 0; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.2); }
        .read-progress-bar { position: absolute; bottom: -1px; left: 0; height: 3px; background: var(--accent); width: 0%; transition: width 0.1s; display: none; }
        .win-modal.full .read-progress-bar { display: block; }
        .win-body { overflow-y: auto; flex: 1; line-height: 1.8; font-size: 17px; color: #1d1d1f; -webkit-overflow-scrolling: touch; }
        .win-modal.full .win-body { padding: 20px; }
        .win-body img { display: block; width: 100%; height: auto; border-radius: 18px; margin: 15px 0; }
        #back-to-top { position: absolute; bottom: 30px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: rgba(255, 255, 255, 0.6); backdrop-filter: var(--ios-liquid); -webkit-backdrop-filter: var(--ios-liquid); border: 0.5px solid rgba(255, 255, 255, 0.4); display: none; align-items: center; justify-content: center; font-size: 20px; color: var(--accent); z-index: 100; opacity: 0; transition: 0.3s; cursor: pointer; }
        #back-to-top.show { opacity: 1; transform: scale(1); }

        .dock-wrapper { 
            position: fixed; bottom: 0; left: 0; right: 0; padding: 20px 0 40px; 
            display: flex; justify-content: center; z-index: 8000;
            background: linear-gradient(to top, var(--bg) 20%, transparent 100%);
            pointer-events: none;
        }
        .dock { 
            display: flex; padding: 10px 20px; gap: 12px; 
            background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(40px) saturate(210%); 
            -webkit-backdrop-filter: blur(40px) saturate(210%); border-radius: 40px; 
            border: 1px solid rgba(255,255,255,0.7); box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            pointer-events: auto;
        }
        .dock-item { display: flex; flex-direction: column; align-items: center; width: 70px; opacity: 0.4; transition: 0.3s; cursor: pointer; }
        .dock-item.active { opacity: 1; transform: translateY(-4px); }
        .dock-text { font-size: 10px; font-weight: 700; margin-top: 3px; }
    </style>
</head>
<body>

<div class="hero-banner" id="parallax-bg"></div>

<div class="container">
    <div class="header">
        <div class="site-title-box">
            <img src="https://github.com/nailong78.png" class="title-avatar">
            <h1 class="site-title">奶龙的个人博客</h1>
        </div>
        <p id="hitokoto" style="font-size:11px; opacity:0.6; margin-top:6px; font-weight:600;">载入中...</p>
    </div>

    <div class="welcome-area">
        <div class="welcome-glow"></div>
        <div class="welcome-text">欢迎光临</div>
    </div>
    
    <div id="p-home" class="page">
        <span class="container-label">文章列表</span>
        <div id="post-list" class="posts-container"></div>
        <span class="container-label">运行状态</span>
        <div class="runtime-card">
            <p style="font-size: 11px; font-weight: 700; opacity: 0.5; margin-bottom: 5px;">本站已安全运行</p>
            <div id="runtime-clock">正在计算时间...</div>
        </div>
    </div>

    <div id="p-about" class="page" style="display:none;">
        <div class="posts-container profile-section">
            <img src="https://github.com/nailong78.png" class="profile-avatar-big">
            <h2 style="font-weight:800; letter-spacing:-1px;">奶龙 (Nailong)</h2>
            <div class="social-group">
                <a href="https://github.com/nailong78" target="_blank" class="social-item">🐱</a>
                <a href="https://t.me/NL78991" target="_blank" class="social-item">✈️</a>
            </div>
            
            <div class="glass-card" style="text-align:left; margin-top:20px;" onclick="initLogUI(event, this)">
                <h3 style="font-size:16px;">📜 更新日志</h3>
                <p style="font-size:11px; opacity:0.5; margin-top:4px;">查看 GitHub Actions 自动更新记录</p>
            </div>

            <div class="glass-card" style="text-align:left; margin-top:12px; cursor:default;">
                <p style="font-size:13px; font-weight:700; color:var(--accent); margin-bottom:8px;">🚀 加速访问地址：</p>
                <div style="background:rgba(0,0,0,0.03); padding:10px; border-radius:12px; font-family:monospace; font-size:11px; word-break:break-all;">
                    https://cdn.jsdelivr.net/gh/nailong78/nailong78.github.io@main/index.html
                </div>
            </div>
        </div>
    </div>
</div>

<div class="win-mask" id="win-mask">
    <div class="win-modal" id="win-modal">
        <div class="win-header">
            <h3 id="win-title" style="font-size:18px; font-weight:700;"></h3>
            <div style="display:flex; gap:8px;">
                <div class="glass-btn" onclick="toggleFull()" style="padding:6px 12px; background:rgba(0,0,0,0.05); border-radius:12px; cursor:pointer;">🔳</div>
                <div class="glass-btn" onclick="closeWin()" style="padding:6px 12px; background:rgba(0,0,0,0.05); border-radius:12px; cursor:pointer; color:#FF3B30;">✕</div>
            </div>
            <div class="read-progress-bar" id="read-progress"></div>
        </div>
        <div id="win-body" class="win-body" onscroll="onWinScroll()"></div>
        <div id="back-to-top" onclick="scrollToTop()">↑</div>
        <div id="win-footer" style="display:none; text-align:center; padding:20px; border-top:1px solid var(--border);">
            <button style="background:var(--accent); color:#fff; border:none; padding:12px 40px; border-radius:15px; font-weight:700;" onclick="closeWin()">确定</button>
        </div>
    </div>
</div>

<div class="dock-wrapper">
    <div class="dock">
        <div class="dock-item active" onclick="nav('home', this)"><span>🏠</span><span class="dock-text">首页</span></div>
        <div class="dock-item" onclick="nav('about', this)"><span>👤</span><span class="dock-text">关于</span></div>
    </div>
</div>

<script>
    const user = "nailong78", repo = "nailong78.github.io";
    let logPage = 1, isLogLoading = false, hasMoreLogs = true, currentLogTitle = "";

    window.addEventListener('scroll', () => {
        const scrolled = window.pageYOffset;
        requestAnimationFrame(() => {
            document.getElementById('parallax-bg').style.transform = `translateY(${scrolled * 0.2}px)`;
        });
    });

    const createRipple = (event, element) => {
        const ripple = document.createElement("span");
        ripple.classList.add("ripple");
        const rect = element.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = `${size}px`;
        ripple.style.left = `${event.clientX - rect.left - size/2}px`;
        ripple.style.top = `${event.clientY - rect.top - size/2}px`;
        element.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
    };

    // 初始化日志 UI
    const initLogUI = (e, el) => {
        createRipple(e, el);
        logPage = 1; hasMoreLogs = true; currentLogTitle = "更新日志";
        openWin(currentLogTitle, '<div id="log-content">正在同步记录...</div>', false);
        fetchMoreLogs();
    };

    // 分页加载核心逻辑
    const fetchMoreLogs = async () => {
        if (isLogLoading || !hasMoreLogs) return;
        isLogLoading = true;
        const container = document.getElementById('log-content');
        if (logPage > 1) {
            const loader = document.createElement('div');
            loader.id = "log-loader";
            loader.style.cssText = "text-align:center; padding:20px; opacity:0.5; font-size:12px;";
            loader.innerText = "正在加载更多历史...";
            container.appendChild(loader);
        }

        try {
            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/actions/runs?per_page=10&page=${logPage}`);
            const data = await res.json();
            const runs = data.workflow_runs;

            if (runs.length < 10) hasMoreLogs = false;
            
            let html = "";
            runs.forEach((run, index) => {
                const count = (logPage - 1) * 10 + index + 1;
                const time = new Date(run.created_at).toLocaleString('zh-CN');
                let msg = run.head_commit.message
                    .replace(/Update/g, '更新').replace(/Add/g, '新增')
                    .replace(/Fix/g, '修复').replace(/Delete/g, '删除');
                html += `<div style="margin-bottom:15px;"><strong>${count}.</strong> <span style="opacity:0.4; font-size:12px;">${time}</span><br><span style="padding-left:15px; display:block; opacity:0.8;">> ${msg}</span></div>`;
            });

            const loader = document.getElementById('log-loader');
            if (loader) loader.remove();
            
            if (logPage === 1) container.innerHTML = html;
            else container.insertAdjacentHTML('beforeend', html);
            
            logPage++;
        } catch (err) {
            if (logPage === 1) container.innerText = "同步失败，请重试";
        } finally {
            isLogLoading = false;
        }
    };

    const parseContent = (text) => {
        return text.replace(/\n/g, '<br>');
    };

    const updateRuntime = () => {
        const start = new Date("2026-01-09 21:25:00").getTime(), now = new Date().getTime(), diff = now - start;
        const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
        document.getElementById("runtime-clock").innerText = `${d}天 ${h}时 ${m}分 ${s}秒`;
    };
    setInterval(updateRuntime, 1000);

    const onWinScroll = () => {
        const body = document.getElementById('win-body'), progress = document.getElementById('read-progress'), btt = document.getElementById('back-to-top'), modal = document.getElementById('win-modal');
        if (body.scrollHeight > body.clientHeight) progress.style.width = (body.scrollTop / (body.scrollHeight - body.clientHeight)) * 100 + '%';
        
        // 触发分页加载
        if (document.getElementById('log-content') && body.scrollTop + body.clientHeight >= body.scrollHeight - 50) {
            fetchMoreLogs();
        }

        if(modal.classList.contains('full') && body.scrollTop > 200) { btt.style.display = 'flex'; setTimeout(() => btt.classList.add('show'), 10); } 
        else { btt.classList.remove('show'); setTimeout(() => { if(!btt.classList.contains('show')) btt.style.display = 'none'; }, 300); }
    };

    const scrollToTop = () => document.getElementById('win-body').scrollTo({ top: 0, behavior: 'smooth' });
    const nav = (p, el) => { document.querySelectorAll('.page').forEach(s => s.style.display = 'none'); document.getElementById('p-'+p).style.display = 'block'; document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); };

    const openWin = (title, content, isNotice = false) => {
        const m = document.getElementById('win-mask'), b = document.getElementById('win-body'), modal = document.getElementById('win-modal');
        document.getElementById('win-title').innerText = title; modal.classList.remove('full');
        document.getElementById('read-progress').style.width = '0%';
        b.innerHTML = content.includes('id="log-content"') ? content : parseContent(content.replace(/^(日期：|作者：).*\n?/gm, ''));
        document.getElementById('win-footer').style.display = isNotice ? 'block' : 'none';
        m.style.display = 'flex'; setTimeout(() => m.classList.add('show'), 50);
    };

    const closeWin = () => { document.getElementById('win-mask').classList.remove('show'); setTimeout(() => document.getElementById('win-mask').style.display = 'none', 400); };
    const toggleFull = () => { document.getElementById('win-modal').classList.toggle('full'); onWinScroll(); };

    const init = async () => {
        updateRuntime();
        fetch('announcement/notice.txt?v='+Date.now()).then(r => r.text()).then(t => { if(t.trim()) openWin('系统公告', t, true); }).catch(()=>{});
        try {
            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/posts?v=`+Date.now());
            if(res.ok) {
                const data = await res.json();
                const list = document.getElementById('post-list');
                for(const f of data.filter(f => f.name.endsWith('.txt'))) {
                    const r = await fetch(`posts/${f.name}?v=`+Date.now()), text = await r.text();
                    const dMatch = text.match(/^日期：(.*)$/m), aMatch = text.match(/^作者：(.*)$/m);
                    const card = document.createElement('div'); card.className = 'glass-card';
                    card.innerHTML = `<h3 style="font-size:18px;">${f.name.replace('.txt','')}</h3>
                        <div class="post-info">
                            ${dMatch ? `<span class="post-tag">📅 ${dMatch[1]}</span>` : ''}
                            ${aMatch ? `<span class="post-tag">✍️ ${aMatch[1]}</span>` : ''}
                        </div>`;
                    card.addEventListener("click", (e) => {
                        createRipple(e, card);
                        setTimeout(() => openWin(f.name.replace('.txt',''), text), 200);
                    });
                    list.appendChild(card);
                }
            }
        } catch(e) {}
        fetch('https://v1.hitokoto.cn?c=e').then(r=>r.json()).then(d=>document.getElementById('hitokoto').innerText = `「每日一言」${d.hitokoto}`);
    };
    window.onload = init;
</script>
</body>
</html>
