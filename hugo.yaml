baseURL: https://nailong78.github.io/
title: 奶龙
theme: stack
languageCode: zh-cn

# 多语言配置
languages:
    zh-cn:
        languageName: 简体中文
        title: 奶龙
        weight: 1
        params:
            description: 奶龙的个人博客
    en:
        languageName: English
        title: Nailong
        weight: 2
        params:
            description: Nailong's Personal Blog
    ja:
        languageName: 日本語
        title: 奶龍
        weight: 3
        params:
            description: 奶龍の個人ブログ

params:
    mainSections:
        - post
    
    # 侧边栏配置
    sidebar:
        subtitle: 奶龙的个人博客
        avatar:
            enabled: false # 如果有头像图片，改为 true 并在下方 src 填入路径

    # 社交链接
    social:
        - identifier: github
          link: "https://github.com/nailong78"
          icon: github

    # 颜色模式
    colorScheme:
        toggle: true
        default: dark

    # 评论、搜索等功能可在此后继续添加
