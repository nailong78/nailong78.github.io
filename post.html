<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>阅读 - Nailong78</title>
    <style>
        :root {
            --bg-color: #050505; --text-main: #ffffff; --text-sub: rgba(255, 255, 255, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.12);
        }
        body.light-mode {
            --bg-color: #f2f4f6; --text-main: #1a1a1a; --text-sub: rgba(0, 0, 0, 0.5);
            --glass-bg: rgba(255, 255, 255, 0.6); --glass-border: rgba(255, 255, 255, 0.8);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); transition: 0.5s; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 100px 25px 50px; }
        .back-nav { position: fixed; top: 30px; left: 20px; z-index: 100; padding: 10px 20px; border-radius: 100px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); color: var(--text-main); text-decoration: none; font-size: 14px; font-weight: 600; }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 20px; line-height: 1.2; }
        .content { font-size: 17px; line-height: 1.8; opacity: 0.9; white-space: pre-wrap; }
        .loading { text-align: center; margin-top: 50px; opacity: 0.5; }
    </style>
</head>
<body>
    <a href="index.html" class="back-nav">← 返回</a>
    <div class="container">
        <h1 id="postTitle">加载中...</h1>
        <div id="postContent" class="content">
            <div class="loading">正在连接数字花园...</div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const fileName = params.get('file');
        
        if (fileName) {
            document.getElementById('postTitle').innerText = fileName.replace('.txt', '');
            // 自动从 posts 文件夹获取
            fetch(`posts/${fileName}`)
                .then(res => res.ok ? res.text() : "文章去星际旅行了...")
                .then(text => {
                    document.getElementById('postContent').innerText = text;
                });
        }

        if (localStorage.getItem('blog-mode') === 'light' || (localStorage.getItem('blog-mode') === 'auto' && new Date().getHours() >= 6 && new Date().getHours() < 18)) {
            document.body.classList.add('light-mode');
        }
    </script>
</body>
</html>
